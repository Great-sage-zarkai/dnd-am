<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DM View — The Party</title>
<meta name="theme-color" content="#1A1A2A">
<style>
:root{
  --bg:#0F0F18;--sf:#1A1A28;--sv:#232336;--ol:#333350;--os:#8080A8;--tx:#E8E8F8;
  --p:#7B5EA7;--pl:#2A1F45;--pd:#C0AAEA;
  --t:#1D9E75;--tl:#0A2820;--td:#6DCFB0;
  --a:#C4A21B;--al:#2A1A00;--ad:#E8C96A;
  --r:#D85A30;--rl:#2A0F08;
  --druid:#5A7C2E;--rogue:#3A7CA5;--sorc:#7F77DD;--cleric:#7B5EA7;
  --rr:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx)}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{height:50px;background:var(--sf);border-bottom:1px solid var(--ol);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:20}
.top-title{font-size:15px;font-weight:700;flex:1}
.top-sub{font-size:11px;color:var(--os)}
.btn-add{background:var(--p);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-add:active{opacity:.8}

/* CHAR TABS */
.char-tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--ol);flex-shrink:0;overflow-x:auto;padding:0 4px}
.char-tab{display:flex;align-items:center;gap:7px;padding:10px 14px;cursor:pointer;border:none;background:none;color:var(--os);font-size:13px;font-weight:500;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .15s;flex-shrink:0}
.char-tab.active{color:var(--tx);border-bottom-color:var(--p)}
.char-tab .ct-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.char-tab .ct-del{font-size:14px;color:var(--os);margin-left:4px;opacity:.5}
.char-tab .ct-del:hover{opacity:1;color:var(--r)}
.no-chars{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--os);padding:40px}
.no-chars .nc-icon{font-size:48px;opacity:.3}
.no-chars p{font-size:14px;line-height:1.6;text-align:center;max-width:280px}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.char-screen{display:none;padding:12px}
.char-screen.active{display:block}

/* CHARACTER HEADER CARD */
.char-hero{border-radius:var(--rr);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.ch-badge{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:rgba(255,255,255,.08)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:18px;font-weight:700;margin-bottom:2px}
.ch-sub{font-size:12px;opacity:.75;margin-bottom:6px}
.ch-hp-row{display:flex;align-items:center;gap:10px}
.ch-hp-num{font-size:22px;font-weight:800;line-height:1}
.ch-hp-label{font-size:10px;opacity:.6}
.ch-hp-bar{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.15);overflow:hidden}
.ch-hp-fill{height:100%;border-radius:4px;transition:width .3s}
.conc-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(216,90,48,.2);border:1px solid rgba(216,90,48,.4);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:#ff9070;margin-top:6px}

/* RESOURCE PIPS */
.res-section{background:var(--sv);border-radius:var(--rr);padding:10px 12px;margin-bottom:10px}
.res-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--ol)}
.res-row:last-child{border-bottom:none}
.res-nm{font-size:12px;color:var(--os);width:160px;flex-shrink:0}
.res-pips{display:flex;gap:4px;flex:1}
.rpip{width:14px;height:14px;border-radius:50%;border:2px solid var(--p)}
.rpip.f{background:var(--p)}
.rpip.e{background:transparent}
.res-ct{font-size:11px;color:var(--os);min-width:28px;text-align:right}
.slot-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--ol)}
.slot-row:last-child{border-bottom:none}
.slot-lv{font-size:11px;font-weight:700;background:var(--tl);color:var(--td);border-radius:5px;padding:1px 7px;min-width:32px;text-align:center;flex-shrink:0}
.slot-pips{display:flex;gap:3px;flex:1}
.spip{width:12px;height:12px;border-radius:50%;border:2px solid var(--t);background:var(--t)}
.spip.e{background:transparent}
.slot-ct{font-size:11px;color:var(--os);min-width:28px;text-align:right}

/* SECTION TITLES */
.sec-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--os);padding:10px 0 6px;display:flex;align-items:center;gap:6px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--ol)}

/* SPELL CARDS */
.spell-card{background:var(--sv);border:1px solid var(--ol);border-radius:8px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border-color .1s}
.spell-card:hover{border-color:var(--p)}
.spell-card.domain{background:var(--al);border-color:rgba(196,162,27,.3)}
.spell-card.conc{border-color:rgba(216,90,48,.4)}
.sc-header{display:flex;align-items:center;gap:8px;padding:9px 12px}
.sc-name{font-size:13px;font-weight:700;flex:1}
.sc-badges{display:flex;gap:4px;align-items:center;flex-shrink:0}
.badge{display:inline-block;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:600}
.bl{background:var(--pl);color:var(--pd)}
.bt{background:var(--tl);color:var(--td)}
.ba{background:var(--al);color:var(--ad)}
.br{background:var(--rl);color:#ff9070}
.bg{background:rgba(255,255,255,.08);color:var(--os)}
.sc-meta{font-size:11px;color:var(--os);padding:0 12px 4px}
.sc-body{border-top:1px solid var(--ol);padding:10px 12px;display:none}
.sc-body.open{display:block}
.sc-desc{font-size:13px;color:var(--tx);line-height:1.6;margin-bottom:6px}
.sc-tip{background:rgba(123,94,167,.15);border-radius:6px;padding:7px 10px;font-size:11px;color:var(--pd);line-height:1.5;border-left:3px solid var(--p)}

/* TRAIT CARDS */
.trait-card{background:var(--sv);border-left:3px solid var(--p);border-radius:0 8px 8px 0;padding:9px 12px;margin-bottom:6px}
.trait-card.gold{border-left-color:var(--a)}
.trait-nm{font-size:13px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.trait-src{font-size:10px;color:var(--os)}
.trait-ds{font-size:12px;color:var(--os);line-height:1.55}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--sf);border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:20px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--os);font-size:22px;cursor:pointer}
.load-option{background:var(--sv);border:1.5px solid var(--ol);border-radius:var(--rr);padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.load-option:hover{border-color:var(--p)}
.load-option h3{font-size:14px;font-weight:700;margin-bottom:4px}
.load-option p{font-size:12px;color:var(--os)}
.url-input{width:100%;border:1.5px solid var(--ol);border-radius:8px;padding:10px;font-size:13px;background:var(--bg);color:var(--tx);margin-bottom:10px;font-family:monospace}
.url-input:focus{outline:none;border-color:var(--p)}
.btn-load{width:100%;padding:12px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-load:active{opacity:.8}
.btn-load.disabled{background:var(--ol);color:var(--os);cursor:not-allowed}
.cam-wrap{width:100%;aspect-ratio:1;background:#000;border-radius:8px;overflow:hidden;margin-bottom:10px;position:relative}
.cam-wrap video{width:100%;height:100%;object-fit:cover}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-frame{width:65%;aspect-ratio:1;border:3px solid rgba(123,94,167,.8);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.4)}
.cam-hint{text-align:center;font-size:12px;color:var(--os);margin-bottom:10px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--ol);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="top-title">🎲 DM Dashboard</div>
    <div class="top-sub" id="party-sub">No characters loaded</div>
  </div>
  <button class="btn-add" onclick="openLoadModal()">+ Add Character</button>
</div>

<div class="char-tabs" id="char-tabs"></div>

<div class="scroll-area" id="scroll-area">
  <div class="no-chars" id="no-chars">
    <div class="nc-icon">🎲</div>
    <p>No characters loaded yet.<br>Click <strong>+ Add Character</strong> and scan a player's QR code or paste their share URL.</p>
  </div>
  <div id="char-screens"></div>
</div>

<!-- LOAD MODAL -->
<div class="modal-bg" id="load-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      Load Character
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">
      <div class="load-option" onclick="showUrlInput()">
        <h3>🔗 Paste Share URL</h3>
        <p>Player copies their URL from the Share button and sends it to you</p>
      </div>
      <div class="load-option" onclick="showCamera()">
        <h3>📷 Scan QR Code</h3>
        <p>Point camera at the player's QR code</p>
      </div>
    </div>
  </div>
</div>

<script>
// ══ SPELL DATABASE — all 4 classes ══
const SPELLS = {
// ── CLERIC ──
'guidance':{n:'Guidance',lv:0,sc:'Divination',conc:true,time:'Action',range:'Touch',desc:'Touch a creature. Once before the spell ends, it can add 1d4 to one ability check of its choice.',tip:'Best support cantrip. Cast before every skill check.'},
'sacred-flame':{n:'Sacred Flame',lv:0,sc:'Evocation',conc:false,time:'Action',range:'60 ft',desc:'A creature you can see within range must succeed on a DEX save or take 1d8 Radiant damage. Target gains no benefit from cover. Scales at 5/11/17.',tip:'Ignores cover — great vs armored enemies hiding behind walls.'},
'thaumaturgy':{n:'Thaumaturgy',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Minor wonder: booming voice, flickering flames, trembling ground, altered eye color, opening/closing doors. Up to 3 effects active at once.',tip:'Pure roleplay. Intimidation with booming voice and trembling ground.'},
'toll-the-dead':{n:'Toll the Dead',lv:0,sc:'Necromancy',conc:false,time:'Action',range:'60 ft',desc:'A creature you can see must succeed on a WIS save or take 1d8 Necrotic damage (1d12 if it is missing any HP). Scales at 5/11/17.',tip:'Always use d12 version on wounded enemies. Best offensive cleric cantrip.'},
'spare-the-dying':{n:'Spare the Dying',lv:0,sc:'Necromancy',conc:false,time:'Action',range:'15 ft',desc:'[Grave Domain] Stabilize a creature at 0 HP. For Grave Cleric: range is 30 ft and can be cast as a Bonus Action.',tip:'Domain bonus makes this actually usable in combat — Bonus Action from 30 ft.'},
'resistance':{n:'Resistance',lv:0,sc:'Abjuration',conc:true,time:'Action',range:'Touch',desc:'Touch a creature. Once before the spell ends, it can add 1d4 to one saving throw of its choice. (Concentration, 1 min)',tip:'Pre-cast before a known big saving throw.'},
'word-of-radiance':{n:'Word of Radiance',lv:0,sc:'Evocation',conc:false,time:'Action',range:'Self (5-ft)',desc:'Each hostile creature within 5 feet must succeed on a CON save or take 1d6 Radiant damage. Scales at 5/11/17.',tip:'Great when surrounded — hits all melee enemies at once.'},
'light':{n:'Light',lv:0,sc:'Evocation',conc:false,time:'Action',range:'Touch',desc:'Object sheds 20-ft bright light, 20-ft dim light for 1 hour. Can be cast on a hostile creature\'s item (DEX save to avoid).',tip:'Free light source. Attach to a thrown stone or arrow.'},
'mending':{n:'Mending',lv:0,sc:'Transmutation',conc:false,time:'1 min',range:'Touch',desc:'Repair one break or tear in an object. Leaves no trace. Cannot restore magical properties.',tip:'Fix broken weapons and equipment between encounters.'},
'bane':{n:'Bane',lv:1,sc:'Enchantment',conc:true,time:'Action',range:'30 ft',desc:'[Domain] Up to 3 creatures must succeed on a CHA save or subtract 1d4 from all attack rolls and saving throws for 1 minute. (Concentration)',tip:'Simultaneously penalizes enemy attacks AND saves. Massive action economy flip.'},
'false-life':{n:'False Life',lv:1,sc:'Necromancy',conc:false,time:'Action',range:'Self',desc:'[Domain] Gain 2d4+4 Temporary HP for 1 hour. Higher slots: +5 THP per slot above 1st.',tip:'No concentration! Pre-cast before combat for free buffer HP.'},
'bless':{n:'Bless',lv:1,sc:'Enchantment',conc:true,time:'Action',range:'30 ft',desc:'Up to 3 willing creatures add 1d4 to attack rolls and saving throws for 1 minute. (Concentration) Higher slots: +1 creature per slot.',tip:'Best lv1 spell. Bonus to attacks AND saves for 3 allies simultaneously.'},
'command':{n:'Command',lv:1,sc:'Enchantment',conc:false,time:'Action',range:'60 ft',desc:'One creature must succeed on a WIS save or follow a one-word command on its next turn: Flee, Grovel, Halt, Drop, or Approach.',tip:'Grovel = target is prone, all attacks vs them have Advantage. Halt wastes enemy turn.'},
'cure-wounds':{n:'Cure Wounds',lv:1,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'Restore 2d8 + spellcasting modifier HP. +2d8 per slot above 1st.',tip:'Use Healing Word in combat (bonus action); save Cure Wounds for big heals.'},
'detect-magic':{n:'Detect Magic',lv:1,sc:'Divination',conc:true,time:'Action',range:'Self',desc:'Sense the presence of magic within 30 ft. See magical auras and identify the school. (Concentration, 10 min; can be cast as ritual)',tip:'Ritual cast = zero slot cost. Always use before looting rooms.'},
'guiding-bolt':{n:'Guiding Bolt',lv:1,sc:'Evocation',conc:false,time:'Action',range:'120 ft',desc:'Ranged spell attack: 4d6 Radiant. The next attack roll against the target before the end of your next turn has Advantage. +1d6 per slot.',tip:'Doubles as a buff for martial allies. Give Advantage to the fighter.'},
'healing-word':{n:'Healing Word',lv:1,sc:'Abjuration',conc:false,time:'Bonus',range:'60 ft',desc:'Restore 2d4 + spellcasting modifier HP to a visible creature. Bonus action! +2d4 per slot.',tip:'Bonus action! Revive a downed ally AND still cast a spell or attack this turn.'},
'inflict-wounds':{n:'Inflict Wounds',lv:1,sc:'Necromancy',conc:false,time:'Action',range:'Touch',desc:'Melee spell attack: 2d10 Necrotic damage. +2d10 per slot above 1st.',tip:'Huge burst at low levels. Upcast to 3rd (6d10) for a reliable opener.'},
'protection-evil-good':{n:'Protection from Evil & Good',lv:1,sc:'Abjuration',conc:true,time:'Action',range:'Touch',desc:'Chosen creature type (aberration/celestial/elemental/fey/fiend/undead) has Disadvantage on attacks vs. the target and can\'t charm, frighten, or possess it. (Concentration, 10 min)',tip:'Essential vs demons, devils, undead bosses. Put it on the tank.'},
'sanctuary':{n:'Sanctuary',lv:1,sc:'Abjuration',conc:false,time:'Bonus',range:'30 ft',desc:'Bonus action. Attackers must succeed on a WIS save to target the warded creature. Ends if the creature attacks or casts a harmful spell. (1 min)',tip:'Bonus action cast. Protect downed allies or a fragile party member.'},
'shield-of-faith':{n:'Shield of Faith',lv:1,sc:'Abjuration',conc:true,time:'Bonus',range:'60 ft',desc:'+2 AC to a willing creature. Bonus action cast. (Concentration, 10 min)',tip:'Bonus action! +2 AC on the tank before battle, then take your full action.'},
'gentle-repose':{n:'Gentle Repose',lv:2,sc:'Necromancy',conc:false,time:'Action',range:'Touch',desc:'[Domain] Preserve a corpse from decay and prevent undead animation for 10 days. Also extends the time limit for resurrection spells by 10 days. Can be ritual cast.',tip:'Ritual cast = extends Raise Dead window for free.'},
'ray-of-enfeeblement':{n:'Ray of Enfeeblement',lv:2,sc:'Necromancy',conc:true,time:'Action',range:'60 ft',desc:'[Domain] Ranged spell attack. On hit: target must succeed on a CON save or deal only half damage with Strength-based attacks. Repeat save each turn. (Concentration, 1 min)',tip:'Cripples fighters and giants who rely on Strength for attacks.'},
'aid':{n:'Aid',lv:2,sc:'Abjuration',conc:false,time:'Action',range:'30 ft',desc:'Up to 3 creatures gain +5 max HP and current HP for 8 hours. No concentration. +5 HP per slot above 2nd.',tip:'8-hour duration, no concentration. Cast before a big fight.'},
'augury':{n:'Augury',lv:2,sc:'Divination',conc:false,time:'1 min',range:'Self',desc:'Receive an omen (Weal, Woe, both, or nothing) about an action taken in the next 30 minutes. 1 free cast per day. Can be ritual cast.',tip:'Free ritual cast daily. 100% reliable for near-future planning.'},
'blindness-deafness':{n:'Blindness/Deafness',lv:2,sc:'Transmutation',conc:false,time:'Action',range:'120 ft',desc:'CON save or target is Blinded or Deafened for 1 minute (your choice). Repeat save each turn. No concentration. +1 creature per slot.',tip:'Blinded = Disadvantage on attacks, Advantage for attackers. No concentration is huge.'},
'hold-person':{n:'Hold Person',lv:2,sc:'Enchantment',conc:true,time:'Action',range:'60 ft',desc:'WIS save or Paralyzed for 1 minute. Repeat save each turn. Attacks within 5 ft auto-crit. (Concentration) +1 target per slot.',tip:'Auto-crits on every melee hit within 5 ft. Devastating combo with martials.'},
'lesser-restoration':{n:'Lesser Restoration',lv:2,sc:'Abjuration',conc:false,time:'Bonus',range:'Touch',desc:'Bonus action. End one condition on a creature: Blinded, Deafened, Paralyzed, Poisoned, or one disease.',tip:'Bonus action removal of Paralyzed can save a fight.'},
'prayer-of-healing':{n:'Prayer of Healing',lv:2,sc:'Abjuration',conc:false,time:'10 min',range:'30 ft',desc:'Up to 5 creatures each regain 2d8 + spellcasting modifier HP. Cannot be cast during combat. +2d8 per slot.',tip:'Best out-of-combat mass heal. 10-min cast time, no concentration.'},
'silence':{n:'Silence',lv:2,sc:'Illusion',conc:true,time:'Action',range:'120 ft',desc:'20-ft sphere of magical silence. No sound can enter or exit. Creatures inside are immune to thunder damage and cannot cast spells with Verbal components. (Concentration, 10 min)',tip:'Completely shuts down enemy spellcasters. Can be ritual cast.'},
'spiritual-weapon':{n:'Spiritual Weapon',lv:2,sc:'Evocation',conc:false,time:'Bonus',range:'60 ft',desc:'Create a spectral weapon. Bonus action each turn: melee spell attack for 1d8 + spellcasting modifier Force damage. No concentration, 1 min. +1d8 per 2 slots.',tip:'No concentration! Free bonus action attack every single turn.'},
'warding-bond':{n:'Warding Bond',lv:2,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'+1 AC and +1 saving throws to the target. Resistance to all damage. You share all damage the target takes. Lasts 1 hour.',tip:'Powerful tank buff — you take shared damage, position carefully.'},
'zone-of-truth':{n:'Zone of Truth',lv:2,sc:'Enchantment',conc:false,time:'Action',range:'60 ft',desc:'15-ft sphere for 10 minutes. CHA save or creature cannot knowingly lie while inside. All creatures know if they failed the save.',tip:'Interrogation gold. Those who fail literally cannot lie.'},
'revivify':{n:'Revivify',lv:3,sc:'Necromancy',conc:false,time:'Action',range:'Touch',desc:'[Domain] Return a creature that died within the last minute to life with 1 HP. Cannot restore missing body parts. (300 gp diamond consumed)',tip:'Carry at least one diamond. The most impactful emergency spell in the game.'},
'vampiric-touch':{n:'Vampiric Touch',lv:3,sc:'Necromancy',conc:true,time:'Action',range:'Self',desc:'[Domain] Make a melee spell attack. On hit: 3d6 Necrotic damage; regain HP equal to half the damage dealt. Use Action each turn to attack again. (Concentration, 1 min)',tip:'Self-sustaining damage. Great with Spirit Shroud.'},
'animate-dead':{n:'Animate Dead',lv:3,sc:'Necromancy',conc:false,time:'1 min',range:'10 ft',desc:'Create a skeleton or zombie from a pile of bones or a corpse. Undead servant is under your control for 24 hours. Re-cast to maintain. +2 undead per slot.',tip:'Persistent minions. Upcast to 5th for 5 undead simultaneously.'},
'aura-of-vitality':{n:'Aura of Vitality',lv:3,sc:'Abjuration',conc:true,time:'Action',range:'Self (30-ft)',desc:'Bonus action each turn: heal one creature within 30 ft for 2d6 HP. (Concentration, 1 min)',tip:'~7 HP per bonus action × 10 turns = ~70 HP total for one 3rd-level slot.'},
'beacon-of-hope':{n:'Beacon of Hope',lv:3,sc:'Abjuration',conc:true,time:'Action',range:'30 ft',desc:'Up to 5 creatures have Advantage on WIS saves and death saving throws and regain maximum HP from healing spells. (Concentration, 1 min)',tip:'Maximize healing + Advantage on death saves. Combine with Mass Cure Wounds.'},
'bestow-curse':{n:'Bestow Curse',lv:3,sc:'Necromancy',conc:true,time:'Action',range:'Touch',desc:'WIS save or cursed for 1 minute (Concentration). Choose: Disadvantage on checks/saves for an ability; Disadvantage on attacks vs. you; lose action on a roll of 4 or less; +1d8 Necrotic on each of your hits. Upcast to 5th: no concentration needed.',tip:'Upcast to 5th for no concentration. Lose-action variant is devastating on solo bosses.'},
'dispel-magic':{n:'Dispel Magic',lv:3,sc:'Abjuration',conc:false,time:'Action',range:'120 ft',desc:'End any spell of 3rd level or lower on the target automatically. For higher-level spells: make a spellcasting ability check (DC 10 + spell level).',tip:'Upcast to auto-succeed on any spell level. Remove enemy concentration.'},
'mass-healing-word':{n:'Mass Healing Word',lv:3,sc:'Abjuration',conc:false,time:'Bonus',range:'60 ft',desc:'Bonus action. Up to 6 visible creatures each regain 2d4 + spellcasting modifier HP. +2d4 per slot.',tip:'Bonus action + 6 targets. Emergency revival of multiple downed allies.'},
'speak-with-dead':{n:'Speak with Dead',lv:3,sc:'Necromancy',conc:false,time:'Action',range:'10 ft',desc:'Ask a corpse up to 5 questions. The corpse only knows what it knew in life, speaks only languages it knew, and gives brief, cryptic answers.',tip:'Interrogate murder victims, extract passwords, learn dungeon secrets.'},
'spirit-guardians':{n:'Spirit Guardians',lv:3,sc:'Conjuration',conc:true,time:'Action',range:'Self (15-ft)',desc:'Spectral forms flit around you. Enemies within the aura: difficult terrain + WIS save or 3d8 Radiant or Necrotic damage when entering or starting their turn there. (Concentration, 10 min) +1d8 per slot.',tip:'Best sustained damage spell for Clerics. Move into melee and watch enemies melt.'},
'spirit-shroud':{n:'Spirit Shroud',lv:3,sc:'Necromancy',conc:true,time:'Bonus',range:'Self',desc:'Your attacks deal an extra 1d8 Necrotic, Radiant, or Cold damage (your choice). Creatures that take this damage can\'t regain HP until the start of your next turn. Enemy speed −10 ft. (Concentration, 1 min)',tip:'Pairs perfectly with Vampiric Touch: extra damage + deny enemy healing.'},
'remove-curse':{n:'Remove Curse',lv:3,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'End all curses affecting one creature or object. If the object is a cursed magic item, its curse remains, but the spell ends the creature\'s attunement to it.',tip:'Also frees the creature from attunement to a cursed magic item.'},
'blight':{n:'Blight',lv:4,sc:'Necromancy',conc:false,time:'Action',range:'30 ft',desc:'[Domain] CON save or take 8d8 Necrotic damage (half on save). Plants automatically fail the save and take maximum damage. No concentration.',tip:'No-concentration nuke. 8d8 avg 36 Necrotic. Plants take 64 max damage.'},
'death-ward':{n:'Death Ward',lv:4,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'[Domain] The first time the creature would drop to 0 HP, it drops to 1 HP instead and the spell ends. Also negates magical instant-death effects. 8 hours.',tip:'Pre-cast on the person most likely to die. 8-hour insurance policy.'},
'aura-of-life':{n:'Aura of Life',lv:4,sc:'Abjuration',conc:true,time:'Action',range:'Self (30-ft)',desc:'Allies within 30 ft gain resistance to Necrotic damage. Each turn, allies at 0 HP regain 1 HP. (Concentration, 10 min)',tip:'Auto-stabilizes downed allies each turn. Huge vs undead encounters.'},
'aura-of-purity':{n:'Aura of Purity',lv:4,sc:'Abjuration',conc:true,time:'Action',range:'Self (30-ft)',desc:'Allies within 30 ft can\'t be diseased and have Advantage on saves vs Blinded, Charmed, Deafened, Frightened, Paralyzed, Poisoned, and Stunned conditions. (Concentration, 10 min)',tip:'Blanket protection vs status effects. Incredible vs condition-heavy casters.'},
'banishment':{n:'Banishment',lv:4,sc:'Abjuration',conc:true,time:'Action',range:'30 ft',desc:'CHA save or target is banished (Incapacitated, no actions). If Concentration is maintained for 1 full minute, extraplanar creatures are permanently banished. +1 creature per slot.',tip:'Remove a powerful enemy from the fight. Permanent vs extraplanar creatures!'},
'divination':{n:'Divination',lv:4,sc:'Divination',conc:false,time:'Action',range:'Self',desc:'Your deity gives a truthful answer to one question about a goal in the next 7 days. 1 free cast per day; additional casts risk false info. Can be ritual cast.',tip:'Free ritual cast daily. Guaranteed deity information.'},
'freedom-of-movement':{n:'Freedom of Movement',lv:4,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'Ignore difficult terrain, not slowed by magic, immune to paralyzed and restrained, spend only 5 ft of movement to escape a grapple. 1 hour, no concentration.',tip:'No concentration + 1 hour. Give to the frontliner.'},
'guardian-of-faith':{n:'Guardian of Faith',lv:4,sc:'Conjuration',conc:false,time:'Action',range:'30 ft',desc:'Large spectral guardian: hostile creatures entering within 10 ft take 20 Radiant damage (DEX save for half). Disappears after dealing 60 total damage. 8 hours.',tip:'Set-and-forget area denial on a chokepoint for 8 hours.'},
'antilife-shell':{n:'Antilife Shell',lv:5,sc:'Abjuration',conc:true,time:'Action',range:'Self (10-ft)',desc:'[Domain] A 10-ft aura: living creatures cannot willingly enter. (Not undead or constructs.) The aura moves with you. (Concentration, 1 hr)',tip:'Walk safely through hordes of living enemies. Forces range-only combat.'},
'raise-dead':{n:'Raise Dead',lv:5,sc:'Necromancy',conc:false,time:'1 hr',range:'Touch',desc:'[Domain] Return a creature dead up to 10 days to life with 1 HP. Cannot restore missing body parts. Creature suffers Exhaustion. (500 gp diamond consumed)',tip:'Always carry a 500 gp diamond. Most critical emergency resource.'},
'circle-of-power':{n:'Circle of Power',lv:5,sc:'Abjuration',conc:true,time:'Action',range:'Self (30-ft)',desc:'Allies within 30 ft have Advantage on saving throws against magical effects. On a successful save against an area damage spell, they take no damage instead of half. (Concentration, 10 min)',tip:'Converts "half damage on save" to zero damage for all allies. Huge vs AOE spells.'},
'commune':{n:'Commune',lv:5,sc:'Divination',conc:false,time:'1 min',range:'Self',desc:'Contact your deity and ask up to 3 yes/no questions. Answers are truthful. 1 free cast per day. Can be ritual cast.',tip:'Free ritual cast daily. Three deity yes/no answers for planning.'},
'contagion':{n:'Contagion',lv:5,sc:'Necromancy',conc:false,time:'Action',range:'Touch',desc:'Melee spell attack. On hit: target makes CON saves at the end of each of its turns. After 3 failed saves, it suffers a disease (Blinding Sickness, Filth Fever, Flesh Rot, Mindfire, Seizure, or Slimy Doom).',tip:'3 failures = boss has a permanent disease for the rest of the encounter.'},
'dawn':{n:'Dawn',lv:5,sc:'Evocation',conc:true,time:'Action',range:'60 ft',desc:'30-ft radius, 40-ft tall cylinder of daylight. Undead have Disadvantage on attack rolls. Any creature that enters or starts its turn inside takes 4d10 Radiant damage. (Concentration, 1 min)',tip:'Undead bane. They can\'t attack effectively while melting inside.'},
'flame-strike':{n:'Flame Strike',lv:5,sc:'Evocation',conc:false,time:'Action',range:'60 ft',desc:'10-ft radius, 40-ft cylinder: DEX save or 4d6 Fire + 4d6 Radiant damage (half on save). +1d6 of each type per slot above 5th.',tip:'Two damage types — very hard to fully resist. Bypasses many creature immunities.'},
'greater-restoration':{n:'Greater Restoration',lv:5,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'Remove one of these: reduce Exhaustion by 1; end one charm/petrify/curse effect; restore a reduced ability score to normal; restore a reduced HP maximum. (100 gp diamond dust consumed)',tip:'Only reliable cure for petrification and exhaustion.'},
'holy-weapon':{n:'Holy Weapon',lv:5,sc:'Evocation',conc:true,time:'Bonus',range:'Touch',desc:'Imbue a weapon with holy power: +2d8 Radiant on each hit. Bonus action to dismiss: 30-ft burst, CON save or Blinded for 1 minute. (Concentration, 1 hr)',tip:'Give to a martial. +2d8 Radiant all fight, then explosive Blinded finale on dismiss.'},
'mass-cure-wounds':{n:'Mass Cure Wounds',lv:5,sc:'Abjuration',conc:false,time:'Action',range:'60 ft',desc:'Up to 6 creatures each regain 5d8 + spellcasting modifier HP. No concentration. +1d8 per slot above 5th.',tip:'Emergency mass heal. ~22+WIS to 6 targets. Best used to save multiple near-dead allies.'},
'scrying':{n:'Scrying',lv:5,sc:'Divination',conc:true,time:'10 min',range:'Self',desc:'Observe a creature on the same plane (WIS save, modified by familiarity with the target). An invisible sensor appears near the target. (Concentration, 10 min)',tip:'Track enemy leaders before confronting them.'},
'blade-barrier':{n:'Blade Barrier',lv:6,sc:'Evocation',conc:true,time:'Action',range:'90 ft',desc:'Wall of whirling blades (up to 100 ft long, 20 ft tall, 5 ft thick): DEX save or 6d10 Slashing damage (half on save). Difficult terrain. (Concentration, 10 min)',tip:'Zone denial + massive damage. Force enemies to walk through it or go around.'},
'harm':{n:'Harm',lv:6,sc:'Necromancy',conc:false,time:'Action',range:'60 ft',desc:'CON save or take 14d6 Necrotic damage (half on save). Target\'s HP maximum is reduced by the Necrotic damage dealt for 1 hour. Cannot drop below 1 HP.',tip:'Reduces enemy max HP. Combine with other damage for sustained pressure.'},
'heal':{n:'Heal',lv:6,sc:'Abjuration',conc:false,time:'Action',range:'60 ft',desc:'Restore 70 HP to a creature within range. Also ends Blinded, Deafened, and any diseases. No concentration. +10 HP per slot above 6th.',tip:'70 HP + condition clearing in one action. Best single-target healing spell.'},
'heroes-feast':{n:"Heroes' Feast",lv:6,sc:'Conjuration',conc:false,time:'10 min',range:'Self (10-ft)',desc:'Feast for up to 12 creatures: cured of all diseases and poison, immune to frightened and poisoned conditions, Advantage on WIS saves, +2d10 maximum HP for 24 hours. (1,000 gp bowl consumed)',tip:'Pre-cast before a known boss fight. WIS Advantage + HP last all day.'},
'sunbeam':{n:'Sunbeam',lv:6,sc:'Evocation',conc:true,time:'Action',range:'Self (60-ft line)',desc:'60-ft line of brilliant light: CON save or 6d8 Radiant + Blinded for 1 minute. Undead have Disadvantage on the save. Action each turn to re-emit the beam. (Concentration, 1 min)',tip:'Reusable each turn! Blinded enemies are severely penalized. Obliterates undead.'},
'true-seeing':{n:'True Seeing',lv:6,sc:'Divination',conc:false,time:'Action',range:'Touch',desc:'Creature gains Truesight (120 ft), can see into the Ethereal Plane, and sees through illusions and magical darkness. 1 hour.',tip:'Counter invisibility and illusions for a full hour.'},
'word-of-recall':{n:'Word of Recall',lv:6,sc:'Conjuration',conc:false,time:'Action',range:'5 ft',desc:'You and up to 5 willing creatures teleport instantly to the sanctuary you previously designated with this spell.',tip:'Emergency party extraction. Designate your home temple as sanctuary first.'},
'divine-word':{n:'Divine Word',lv:7,sc:'Evocation',conc:false,time:'Bonus',range:'30 ft',desc:'Bonus action. Visible creatures by current HP: ≤5 die; ≤10 are Stunned; ≤30 are Blinded and Deafened; ≤50 are Deafened. Celestials, elementals, fey, fiends: CHA save or banished to their home plane.',tip:'Bonus action! Instantly kills or cripples weakened enemies.'},
'etherealness':{n:'Etherealness',lv:7,sc:'Conjuration',conc:false,time:'Action',range:'Self',desc:'Enter the Ethereal Plane. Can move through objects and walls. Can\'t affect or be affected by the material plane. Can see 60 ft into the material plane. 8 hours.',tip:'Walk through walls. Escape any physical danger. Set up ambushes.'},
'fire-storm':{n:'Fire Storm',lv:7,sc:'Evocation',conc:false,time:'Action',range:'150 ft',desc:'Up to 10 10-ft cubes (arrange freely within range): DEX save or 7d10 Fire damage (half on save). Magical vegetation in the area burns. No concentration.',tip:'Shape the cubes to exclude allies. Flexible area + no concentration at this level.'},
'plane-shift':{n:'Plane Shift',lv:7,sc:'Conjuration',conc:false,time:'Action',range:'Touch',desc:'Transport yourself and up to 8 willing creatures to another plane. OR make a melee spell attack to banish a creature (CHA save). Requires a forked rod attuned to the destination.',tip:'Banish the boss to a hellish plane, or escape any situation instantly.'},
'regenerate':{n:'Regenerate',lv:7,sc:'Transmutation',conc:false,time:'1 min',range:'Touch',desc:'Restore 4d8+15 HP immediately. Regrow severed body parts within 2 minutes. Regain 1 HP every 6 seconds for 1 hour. No concentration.',tip:'Pre-cast before a dungeon: ~600 HP of slow regeneration over an hour.'},
'resurrection':{n:'Resurrection',lv:7,sc:'Necromancy',conc:false,time:'1 hr',range:'Touch',desc:'Return a creature dead up to 100 years to life with full HP. Restores all missing body parts. (1,000 gp diamond consumed)',tip:'Unlike Raise Dead, fully restores the body. 100-year time limit.'},
'antimagic-field':{n:'Antimagic Field',lv:8,sc:'Abjuration',conc:true,time:'Action',range:'Self (10-ft)',desc:'10-ft sphere of antimagic. Spells can\'t be cast inside or pass through it. Magical items are inert while in the sphere. The sphere moves with you. (Concentration, 1 hr)',tip:'Completely shuts down enemy spellcasters. Note: your spells also stop.'},
'holy-aura':{n:'Holy Aura',lv:8,sc:'Abjuration',conc:true,time:'Action',range:'Self (30-ft)',desc:'Allies within 30 ft have Advantage on all saving throws and impose Disadvantage on attacks against them. Undead and fiends that hit an ally must succeed on a CON save or be Blinded. (Concentration, 1 min)',tip:'Ultimate defensive aura. Advantage on every save + Disadvantage on every attack.'},
'sunburst':{n:'Sunburst',lv:8,sc:'Evocation',conc:false,time:'Action',range:'150 ft',desc:'60-ft radius burst of brilliant light: CON save or 12d6 Radiant + Blinded for 1 minute (half damage, not blinded on save). Magical darkness in the area is dispelled. No concentration.',tip:'Massive AOE, no concentration. 12d6 avg 42 Radiant. Obliterates undead.'},
'mass-heal':{n:'Mass Heal',lv:9,sc:'Abjuration',conc:false,time:'Action',range:'60 ft',desc:'Restore a total of 700 HP, divided however you choose among any number of creatures you can see within range. Also ends Blinded, Deafened, and diseases on all affected creatures.',tip:'700 HP to distribute freely. Can fully heal an entire party in one action.'},
'true-resurrection':{n:'True Resurrection',lv:9,sc:'Necromancy',conc:false,time:'1 hr',range:'Touch',desc:'Return a creature dead up to 200 years to life with full HP. Creates a new body if needed. Counters effects that prevent resurrection. (25,000 gp diamond consumed)',tip:'Creates a body from nothing. Counters wish-blocked death effects.'},
'gate':{n:'Gate',lv:9,sc:'Conjuration',conc:true,time:'Action',range:'60 ft',desc:'Open a portal to another plane. Creatures can pass through in both directions. You can call a specific creature by name; it must succeed on a WIS save to avoid being pulled through. (Concentration, 1 min)',tip:'Call a deity\'s servant by name and force it through.'},
'power-word-heal':{n:'Power Word: Heal',lv:9,sc:'Enchantment',conc:false,time:'Action',range:'60 ft',desc:'Restore all of a creature\'s hit points. The creature also ends the Charmed, Frightened, Paralyzed, and Stunned conditions on itself.',tip:'Full HP restoration + 4 conditions cleared in one action.'},

// ── DRUID (key spells) ──
'druidcraft':{n:'Druidcraft',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Minor nature effect: predict weather, make a flower bloom, create a harmless sensory effect, or light/snuff a campfire.',tip:'Predict weather before a long rest. Signal allies with animal sounds.'},
'shillelagh':{n:'Shillelagh',lv:0,sc:'Transmutation',conc:false,time:'Bonus',range:'Self',desc:'Bonus action. Your club or quarterstaff uses your spellcasting modifier for attacks and deals 1d8 bludgeoning (magic). Lasts 1 minute.',tip:'Warden/Protector: WIS-based melee with magic damage. Essential for melee builds.'},
'starry-wisp':{n:'Starry Wisp',lv:0,sc:'Evocation',conc:false,time:'Action',range:'60 ft',desc:'Ranged spell attack: 1d8 Radiant. Target sheds 10-ft bright light until the start of your next turn (prevents Hiding). Scales at 5/11/17.',tip:'Tag invisible enemies or prevent hiding. Radiant bypasses many resistances.'},
'thorn-whip':{n:'Thorn Whip',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Melee spell attack (30-ft reach): 1d6 Piercing. On hit: pull target up to 10 ft toward you. Scales at 5/11/17.',tip:'Pull enemies off ledges, into hazards, or away from allies.'},
'produce-flame':{n:'Produce Flame',lv:0,sc:'Conjuration',conc:false,time:'Bonus',range:'Self',desc:'Bonus action. Flame in hand (20-ft bright light, 20-ft dim). As action: ranged spell attack, 1d8 Fire (60 ft range). Scales at 5/11/17.',tip:'Free light source AND damage cantrip. Bonus action activation.'},
'entangle':{n:'Entangle',lv:1,sc:'Conjuration',conc:true,time:'Action',range:'90 ft',desc:'STR save or Restrained for 1 min (repeat save each turn). 20-ft square of grasping plants is difficult terrain even for those who save. Requires loose soil or grass. (Concentration)',tip:'Best lv1 control spell. Restrained = Disadvantage on attacks, Advantage on attacks vs target.'},
'healing-word-d':{n:'Healing Word',lv:1,sc:'Abjuration',conc:false,time:'Bonus',range:'60 ft',desc:'Bonus action. Target regains 2d4 + WIS mod HP. +2d4 per slot.',tip:'Bonus action! Revive downed ally AND still cast a spell this turn.'},
'thunderwave':{n:'Thunderwave',lv:1,sc:'Evocation',conc:false,time:'Action',range:'Self (15-ft cube)',desc:'CON save or 2d8 thunder + pushed 10 ft. Half damage on save. Everything in 15-ft cube. Audible 300 ft away. +2d8 per slot.',tip:'Great escape spell when grappled or surrounded.'},
'faerie-fire':{n:'Faerie Fire',lv:1,sc:'Evocation',conc:true,time:'Action',range:'60 ft',desc:'DEX save or outlined in light. Attacks vs outlined creatures have Advantage. Outlined creatures cannot benefit from invisibility. (Concentration, 1 min)',tip:'Best lv1 concentration. Advantage for ALL allies on ALL attacks. Counters invisibility.'},
'moonbeam':{n:'Moonbeam',lv:2,sc:'Evocation',conc:true,time:'Action',range:'120 ft',desc:'5-ft cylinder (40 ft tall) of pale silver moonlight. CON save or 2d10 Radiant (half on save). Shapechangers have Disadvantage. Bonus action: move beam 60 ft each turn. +2d10 per slot. (Concentration, 1 min)',tip:'Radiant vs undead. Disadvantage on save for shapechangers. Move beam as bonus action!'},
'spike-growth':{n:'Spike Growth',lv:2,sc:'Transmutation',conc:true,time:'Action',range:'150 ft',desc:'20-ft radius: difficult terrain AND 2d4 Piercing per 5 ft traveled through it. Ground looks natural (Perception DC 15). Lasts 10 min. (Concentration)',tip:'Brutal area control. Combine with Thorn Whip to drag enemies through it.'},
'pass-without-trace':{n:'Pass without Trace',lv:2,sc:'Abjuration',conc:true,time:'Action',range:'Self',desc:'You and chosen creatures within 30 ft gain +10 to Stealth checks and leave no tracks. (Concentration, 1 hr)',tip:'+10 to stealth is absurd. Essential for infiltration missions.'},
'conjure-animals':{n:'Conjure Animals',lv:3,sc:'Conjuration',conc:true,time:'Action',range:'60 ft',desc:'Summon swarms or beasts that fill a 10-ft cube. They use your spell attack/DC and act on your initiative. (Concentration, 1 hr)',tip:'Circle always-prepared at lv5. Excellent battlefield control.'},
'call-lightning':{n:'Call Lightning',lv:3,sc:'Conjuration',conc:true,time:'Action',range:'120 ft',desc:'Summon storm cloud. Action each turn: call bolt, DEX save or 3d10 Lightning. Half on save. +1d10 in stormy weather. +1d10 per slot. (Concentration, 10 min)',tip:'Best sustained damage. 3d10/turn for 10 turns for one lv3 slot.'},
'polymorph':{n:'Polymorph',lv:4,sc:'Transmutation',conc:true,time:'Action',range:'60 ft',desc:'WIS save or transform into beast of CR ≤ target\'s level. Reverts when HP drops to 0. Target retains personality but not class features. (Concentration, 1 hr)',tip:'Turn the barbarian into a T-Rex (CR 8). Turn a boss into a harmless rabbit.'},
'wall-of-fire':{n:'Wall of Fire',lv:4,sc:'Evocation',conc:true,time:'Action',range:'120 ft',desc:'60-ft wall (20 ft tall, 1 ft thick): 5d8 Fire to chosen side (DEX save for half). Passing through deals 5d8 Fire. +1d8 per slot. (Concentration, 1 min)',tip:'Zone denial + massive damage. Shape around enemies.'},
'antilife-shell-d':{n:'Antilife Shell',lv:5,sc:'Abjuration',conc:true,time:'Action',range:'Self (10-ft)',desc:'10-ft aura: living creatures cannot willingly enter. Moves with you. (Concentration, 1 hr)',tip:'Walk through hordes safely. Force enemies to range-only combat.'},
'mass-cure-wounds-d':{n:'Mass Cure Wounds',lv:5,sc:'Abjuration',conc:false,time:'Action',range:'60 ft',desc:'Up to 6 creatures each regain 5d8 + WIS mod HP. No concentration. +1d8 per slot.',tip:'Emergency mass heal. ~22+WIS to 6 targets at once.'},
'conjure-elemental':{n:'Conjure Elemental',lv:5,sc:'Conjuration',conc:true,time:'Action',range:'60 ft',desc:'Summon an Elemental of CR 5 or lower from a compatible environment. Obeys verbal commands. Becomes hostile if concentration breaks. (Concentration, 1 hr)',tip:'Air Elemental (fly speed + whirlwind). Fire moves through enemies. Choose by terrain.'},
'heal-d':{n:'Heal',lv:6,sc:'Abjuration',conc:false,time:'Action',range:'60 ft',desc:'Restore 70 HP. Also ends Blinded, Deafened, and all diseases. No concentration. +10 HP per slot.',tip:'70 HP + conditions in one action. Best single-target healing.'},
'sunbeam-d':{n:'Sunbeam',lv:6,sc:'Evocation',conc:true,time:'Action',range:'Self (60-ft line)',desc:'CON save or 6d8 Radiant + Blinded 1 min. Undead Disadvantage. Action each turn to re-fire. (Concentration, 1 min)',tip:'Reusable each turn! Obliterates undead.'},
'fire-storm-d':{n:'Fire Storm',lv:7,sc:'Evocation',conc:false,time:'Action',range:'150 ft',desc:'Up to 10 10-ft cubes (arrange freely): DEX save or 7d10 Fire (half on save). No concentration.',tip:'Shape to exclude allies. Flexible area, no concentration.'},
'foresight':{n:'Foresight',lv:9,sc:'Divination',conc:false,time:'1 min',range:'Touch',desc:'8 hours, no concentration. Target cannot be surprised. Advantage on attack rolls, ability checks, and saving throws. Enemies have Disadvantage on attacks against target.',tip:'Cast on yourself before a boss fight. Best buff spell in the game.'},

// ── ROGUE (Arcane Trickster spells + key abilities) ──
'mage-hand':{n:'Mage Hand',lv:0,sc:'Conjuration',conc:false,time:'Action',range:'30 ft',desc:'Create a spectral floating hand within range. Manipulate objects, open containers, retrieve items, pour out a vial. Can\'t attack or lift more than 10 lb. (1 min)',tip:'For Arcane Trickster: invisible and can be used as part of Sleight of Hand.'},
'minor-illusion':{n:'Minor Illusion',lv:0,sc:'Illusion',conc:false,time:'Action',range:'30 ft',desc:'Create a sound or image within range. A sound lasts 1 min. An image (5-ft cube) lasts 1 min and is stationary.',tip:'Create distractions, false voices, or visual decoys. Versatile utility.'},
'prestidigitation':{n:'Prestidigitation',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'10 ft',desc:'Minor magical trick: create small sensory effect, light/snuff fire, clean/soil 1 cu ft, chill/warm/flavor 1 cu ft, mark an object, create small non-magical item (1 hr).',tip:'Infinite creative uses. One of the most flexible cantrips.'},
'find-familiar':{n:'Find Familiar',lv:1,sc:'Conjuration',conc:false,time:'1 hr',range:'10 ft',desc:'Summon a spirit familiar in animal form. It can deliver touch spells. Communicate telepathically within 100 ft. See through its eyes. Can vanish into pocket dimension.',tip:'Delivers touch spells like Shocking Grasp for Sneak Attack at range.'},
'silent-image':{n:'Silent Image',lv:1,sc:'Illusion',conc:true,time:'Action',range:'60 ft',desc:'Create a visual illusion (15-ft cube) that moves and changes as you direct (no sound). INT Investigation check to detect. (Concentration, 10 min)',tip:'Create false walls, creatures, or terrain features to deceive enemies.'},
'charm-person':{n:'Charm Person',lv:1,sc:'Enchantment',conc:false,time:'Action',range:'30 ft',desc:'WIS save or charmed for 1 hour. Treats you as friendly. Spell ends if you/allies harm target. Target knows it was charmed afterward. +1 target per slot.',tip:'Social situations: talk past guards, extract info. Remember: they know later.'},
'disguise-self':{n:'Disguise Self',lv:1,sc:'Illusion',conc:false,time:'Action',range:'Self',desc:'Change your appearance (not physical form): height ±1 ft, weight, features, clothing, gear. Doesn\'t change tactile feel. INT Investigation (DC = spell save DC) to detect. 1 hour.',tip:'Infiltration essential. Change appearance before entering any guarded location.'},
'color-spray':{n:'Color Spray',lv:1,sc:'Illusion',conc:false,time:'Action',range:'Self (15-ft cone)',desc:'Blinded creatures in a 15-ft cone until end of your next turn. Affects creatures in order of HP (lowest first), totaling 6d10 HP worth.',tip:'Cheap crowd control at low levels. Blind low-HP enemies or minions.'},
'blur':{n:'Blur',lv:2,sc:'Illusion',conc:true,time:'Action',range:'Self',desc:'Your body is blurred. Attackers have Disadvantage on attacks against you (unless using abilities that ignore Disadvantage). (Concentration, 1 min)',tip:'Self-defense when in melee. Reliable if no Truesight or Blindsight nearby.'},
'invisibility':{n:'Invisibility',lv:2,sc:'Illusion',conc:true,time:'Action',range:'Touch',desc:'Creature becomes invisible. Spell ends if it attacks or casts a spell. (Concentration, 1 hr) +1 creature per slot.',tip:'Extremely powerful. Sneak Attack on every attack while invisible.'},
'hold-person-r':{n:'Hold Person',lv:2,sc:'Enchantment',conc:true,time:'Action',range:'60 ft',desc:'WIS save or Paralyzed. Repeat save each turn. Attacks within 5 ft auto-crit. (Concentration, 1 min) +1 humanoid per slot.',tip:'Auto-crits from within 5 ft. Combined with Sneak Attack = devastating.'},
'hypnotic-pattern':{n:'Hypnotic Pattern',lv:3,sc:'Illusion',conc:true,time:'Action',range:'120 ft',desc:'30-ft cube: WIS save or Incapacitated and speed 0 for 1 min. Effect ends if creature takes damage or someone uses action to shake it out. (Concentration)',tip:'One of the best crowd control spells. Shut down multiple enemies at once.'},
'greater-invisibility':{n:'Greater Invisibility',lv:4,sc:'Illusion',conc:true,time:'Action',range:'Touch',desc:'Creature becomes invisible. Spell does NOT end when it attacks or casts spells. (Concentration, 1 min)',tip:'Unlike regular invisibility, persists through attacks. Every attack has Advantage.'},
'phantasmal-killer':{n:'Phantasmal Killer',lv:4,sc:'Illusion',conc:true,time:'Action',range:'120 ft',desc:'WIS save or frightened by a phantasm only target can see. Repeat save each turn, 4d10 Psychic on failed save. (Concentration, 1 min)',tip:'Persistent psychic damage + frightened condition if target keeps failing.'},
'mislead':{n:'Mislead',lv:5,sc:'Illusion',conc:true,time:'Action',range:'Self',desc:'Become invisible and simultaneously create an illusory double at your location. The double can move, gesture, speak. You can see and hear through the double. (Concentration, 1 hr)',tip:'Total concealment while controlling a double. Perfect infiltration.'},

// ── SORCERER (Aberrant Mind) ──
'mind-sliver':{n:'Mind Sliver',lv:0,sc:'Enchantment',conc:false,time:'Action',range:'60 ft',desc:'INT save or 1d6 Psychic damage. On failed save: target subtracts 1d4 from its next saving throw before end of your next turn. Scales at 5/11/17.',tip:'Cast BEFORE a save-or-suck spell. Free debuff with no slot cost.'},
'sword-burst':{n:'Sword Burst',lv:0,sc:'Conjuration',conc:false,time:'Action',range:'Self (5-ft)',desc:'Brief field of swords: DEX save or 1d6 Force to all other creatures within 5 ft. Scales at 5/11/17.',tip:'Good when surrounded. Force damage has almost no resistances.'},
'chill-touch':{n:'Chill Touch',lv:0,sc:'Necromancy',conc:false,time:'Action',range:'Touch',desc:'Melee spell attack: 1d10 Necrotic. Target can\'t regain HP until start of your next turn. Undead also have Disadvantage on attacks vs you until then. Scales.',tip:'Deny healing on a key target. Great vs regenerating enemies.'},
'mage-hand-s':{n:'Mage Hand',lv:0,sc:'Conjuration',conc:false,time:'Action',range:'30 ft',desc:'Spectral hand to manipulate objects, open containers, retrieve items within range. Can\'t attack. (1 min)',tip:'Psionic Sorcerer: appears invisible by default.'},
'message':{n:'Message',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'120 ft',desc:'Whisper a message to a creature within range. It can reply in a whisper only you hear. Doesn\'t need line of sight (only line of effect).',tip:'Silent communication in combat or social situations.'},
'dissonant-whispers':{n:'Dissonant Whispers',lv:1,sc:'Enchantment',conc:false,time:'Action',range:'60 ft',desc:'WIS save or 3d6 Psychic + target uses its reaction to immediately move away (no Opportunity Attacks). On save: half damage, no movement. +1d6 per slot.',tip:'Forces enemy to waste reaction AND move away. Removes it from melee.'},
'arms-of-hadar':{n:'Arms of Hadar',lv:1,sc:'Conjuration',conc:false,time:'Action',range:'Self (10-ft)',desc:'Tendrils erupt from you. STR save or 2d6 Necrotic; can\'t take reactions until next turn. Half on save. +2d6 per slot.',tip:'No reactions for enemies means no Shield reactions. Good opener before AoE.'},
'tasha-mind-whip':{n:"Tasha's Mind Whip",lv:1,sc:'Enchantment',conc:false,time:'Action',range:'90 ft',desc:'INT save or 3d6 Psychic + must choose between moving, Action, or bonus action (loses one). +1d6 and +1 target per slot.',tip:'Forces enemy to sacrifice action economy. Scaling with slot is excellent.'},
'calm-emotions':{n:'Calm Emotions',lv:2,sc:'Enchantment',conc:true,time:'Action',range:'60 ft',desc:'20-ft sphere: suppress charm/fear on humanoids OR make hostile creatures indifferent (until attacked). WIS save. (Concentration, 1 min)',tip:'De-escalate a mob or stop a berserk ally.'},
'detect-thoughts':{n:'Detect Thoughts',lv:2,sc:'Divination',conc:true,time:'Action',range:'Self',desc:'Read surface thoughts of a visible creature (Wisdom modifier check to avoid). Deeper probing requires INT save. Detects presence of thoughts within 30 ft. (Concentration, 1 min)',tip:'Interrogation and infiltration tool. Works through walls for detection.'},
'suggestion':{n:'Suggestion',lv:2,sc:'Enchantment',conc:true,time:'Action',range:'30 ft',desc:'WIS save or carry out a reasonable suggestion for up to 8 hours. The suggestion must be worded to sound plausible. (Concentration)',tip:'Extremely powerful social and combat control. "Drop your weapon and leave."'},
'hunger-of-hadar':{n:'Hunger of Hadar',lv:3,sc:'Conjuration',conc:true,time:'Action',range:'150 ft',desc:'20-ft sphere of blackness. Blind inside. DEX save or 2d6 Cold at start of turn; CON save or 2d6 Acid at end of turn. Difficult terrain. (Concentration, 1 min)',tip:'Two saves per turn, difficult terrain, blinded. Devastating zone of denial.'},
'summon-aberration':{n:'Summon Aberration',lv:4,sc:'Conjuration',conc:true,time:'Action',range:'90 ft',desc:'Summon an aberrant spirit (Beholderkin, Slaad, or Star Spawn). It uses your spell attack/DC. Scales with slot level for damage and HP. (Concentration, 1 hr)',tip:'Flexible summon. Beholderkin has a ranged eye ray. All have good HP.'},
'raulothim-psychic-lance':{n:"Raulothim's Psychic Lance",lv:4,sc:'Enchantment',conc:false,time:'Action',range:'120 ft',desc:'Name a creature or target one you can see. INT save or 7d6 Psychic + Incapacitated until end of next turn. On save: half, not Incapacitated. +1d6 per slot.',tip:'No concentration incapacitation. Say the name through walls for a range bonus.'},
'dominate-person':{n:'Dominate Person',lv:5,sc:'Enchantment',conc:true,time:'Action',range:'60 ft',desc:'WIS save or charmed + fully under your control for 1 min. Repeat save when taking damage. Issue mental commands (no action). (Concentration) +1 duration level per slot.',tip:'Turn an enemy into your ally. Use them to attack their own allies.'},
'scatter':{n:'Scatter',lv:6,sc:'Conjuration',conc:false,time:'Action',range:'30 ft',desc:'Up to 5 creatures (WIS save to resist for unwilling) teleport to unoccupied spaces within 120 ft that you can see.',tip:'Reposition allies or scatter enemies. Drop an enemy into a hazard.'},
'power-word-pain':{n:'Power Word: Pain',lv:7,sc:'Enchantment',conc:false,time:'Action',range:'60 ft',desc:'Target with 100+ HP must succeed on a CON save or be Incapacitated, halved speed, and disadvantaged on attacks/saves until it succeeds on a CON save at the end of its turn.',tip:'No concentration incapacitation on targets with 100+ HP.'},

// ── DRUID extra spells (IDs from druid app) ──
'control-flames':{n:'Control Flames',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'60 ft',desc:'Expand, move, or extinguish a nonmagical flame up to 5-ft cube. Alter color, create simple shapes, or snuff entirely. Instantaneous changes are permanent.',tip:'Extinguish torches silently for stealth. Create shaped flames for signaling.'},
'create-bonfire':{n:'Create Bonfire',lv:0,sc:'Conjuration',conc:true,time:'Action',range:'60 ft',desc:'Create a bonfire in a 5-ft cube. CON save or 1d8 fire damage on entering. Difficult terrain. Scales: +1d8 at 5/11/17. (Conc, 1 min)',tip:'Zone denial cantrip. Drop on a doorway — enemies must pass through or go around.'},
'druidcraft':{n:'Druidcraft',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Minor nature effects: predict weather next 24h, make a flower bloom, create a harmless sensory effect, or instantly light/snuff a campfire.',tip:'Predict weather before a long rest. Signal allies with sounds or light.'},
'elementalism':{n:'Elementalism',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Minor elemental effect: small earth tremor (no damage), mist or fog, fire flare/dim, or move 1 gallon of water. Cannot deal damage.',tip:'Move water out of boots, create concealing mist, or signal with fire.'},
'frostbite':{n:'Frostbite',lv:0,sc:'Evocation',conc:false,time:'Action',range:'60 ft',desc:'CON save or 1d6 cold damage and Disadvantage on next weapon attack before end of next turn. Scales: +1d6 at 5/11/17.',tip:'Pairs with allies who use weapon attacks. Debuff on a save is great action economy.'},
'gust':{n:'Gust',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'STR save or pushed 5 ft. Can open/close an unlocked door or window, or knock a small object from a surface.',tip:'Knock projectiles off ledges, open doors from range, minor repositioning.'},
'infestation':{n:'Infestation',lv:0,sc:'Conjuration',conc:false,time:'Action',range:'30 ft',desc:'CON save or 1d6 poison damage and moved 5 ft in a random direction. Movement doesn\'t provoke OA. Scales: +1d6 at 5/11/17.',tip:'Random push can break concentration or push enemies off ledges. Situationally strong.'},
'magic-stone':{n:'Magic Stone',lv:0,sc:'Transmutation',conc:false,time:'Bonus',range:'Touch',desc:'Bonus action. Imbue 1–3 pebbles: ranged spell attack (+WIS mod+Prof), 1d6+WIS mod bludgeoning. Can give to an ally to throw. Duration 1 min.',tip:'Hand stones to an ally with Extra Attack. They use your spell stat with their action economy.'},
'mold-earth':{n:'Mold Earth',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Move 5-ft cube of loose earth 5 ft. Create/destroy difficult terrain. Excavate writing in earth. Changes last 1 hour.',tip:'Create instant foxholes for cover, fill pit traps, or dig under walls.'},
'poison-spray':{n:'Poison Spray',lv:0,sc:'Necromancy',conc:false,time:'Action',range:'30 ft',desc:'CON save or 1d12 poison damage. Scales: +1d12 at 5/11/17. Highest damage cantrip but common resistance.',tip:'High damage vs creatures with no poison resistance. Avoid vs undead/constructs.'},
'primal-savagery':{n:'Primal Savagery',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'Self',desc:'Melee spell attack. Your teeth or nails become natural weapons: 1d10 acid damage on hit. Scales: +1d10 at 5/11/17.',tip:'Best melee cantrip for druids. Strong with Potent Spellcasting.'},
'shape-water':{n:'Shape Water',lv:0,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Move 5-ft cube of water 5 ft. Change flow direction. Create simple shapes (1h). Freeze water (1h). Alter color/opacity.',tip:'Freeze water to create bridges. Combine with other water-based spells.'},
'thunderclap':{n:'Thunderclap',lv:0,sc:'Evocation',conc:false,time:'Action',range:'Self 5ft',desc:'CON save or 1d6 thunder to ALL creatures within 5-ft emanation. Sound audible 100 ft away. Scales at 5/11/17.',tip:'Good area cantrip when surrounded. Noise attracts attention — bad for stealth.'},
'absorb-elements':{n:'Absorb Elements',lv:1,sc:'Abjuration',conc:false,time:'Reaction',range:'Self',desc:'Reaction when taking acid/cold/fire/lightning/thunder damage. Gain resistance to that type until start of next turn. Add 1d6 of that type to next melee attack.',tip:'Free reaction spell. Saves your life vs elementals and breath weapons.'},
'animal-friendship':{n:'Animal Friendship',lv:1,sc:'Enchantment',conc:false,time:'Action',range:'30 ft',desc:'WIS save (INT 4 or lower fails auto) or beast is charmed for 24 hours. Higher slots: +1 beast per slot above 1st.',tip:'Charm predators, get mounts, gather animal allies. Roleplay gold.'},
'earth-tremor':{n:'Earth Tremor',lv:1,sc:'Evocation',conc:false,time:'Action',range:'10 ft',desc:'DEX save or 1d12 bludgeoning + knocked prone in 10-ft radius. Creates difficult terrain from loose rock. Scales: +1d12 per slot.',tip:'Massive AOE at low levels. Combine with ranged attacks — prone + difficult terrain.'},
'fog-cloud':{n:'Fog Cloud',lv:1,sc:'Conjuration',conc:true,time:'Action',range:'120 ft',desc:'20-ft radius sphere of thick fog (heavily obscured). Scales: +20-ft radius per slot. (Conc, 1 hr)',tip:'Blinding zone. Great escape tool or to negate enemy ranged attacks.'},
'goodberry':{n:'Goodberry',lv:1,sc:'Transmutation',conc:false,time:'Action',range:'Touch',desc:'Create 10 magical berries. Each heals 1 HP and provides nutrition for 24 hours. Berries lose magic after 24 hours.',tip:'Pre-cast before rest. 10 HP of healing for 1 lv1 slot. Keeps party fed.'},
'ice-knife':{n:'Ice Knife',lv:1,sc:'Conjuration',conc:false,time:'Action',range:'60 ft',desc:'Ranged spell attack: 1d10 piercing. On hit or miss: DEX save or 2d6 cold to all within 5 ft. Higher slots: +2d6 cold per slot.',tip:'Burst damage + area cold. Even on miss the explosion triggers.'},
'longstrider':{n:'Longstrider',lv:1,sc:'Transmutation',conc:false,time:'Action',range:'Touch',desc:'Speed +10 ft for 1 hour. No concentration. Higher slots: +1 target per slot.',tip:'No concentration! Buff the whole party at lv5+. Huge mobility boost.'},
'purify-food':{n:'Purify Food and Drink',lv:1,sc:'Transmutation',conc:false,time:'Action',range:'10 ft',desc:'Purify all nonmagical food and drink within 5-ft radius, removing poison and disease. Can be ritual cast.',tip:'Ritual cast before eating in a dungeon. Zero slot cost.'},
'snare':{n:'Snare',lv:1,sc:'Abjuration',conc:false,time:'1 min',range:'Touch',desc:'Invisible magical trap. DEX save or restrained until dispelled. 8-hour duration.',tip:'Set before a long rest to protect camp. Invisible + 8 hours = passive sentinel.'},
'speak-with-animals':{n:'Speak with Animals',lv:1,sc:'Divination',conc:false,time:'Action',range:'Self',desc:'Understand and be understood by beasts for 10 minutes. Beasts share knowledge of nearby locations and events. Can be ritual cast.',tip:'Always prepared via Druidic. Ritual cast free. Scouts, warning systems.'},
'barkskin':{n:'Barkskin',lv:2,sc:'Transmutation',conc:false,time:'Bonus',range:'Touch',desc:'Bonus action. Minimum AC becomes 17 for 1 hour. No concentration.',tip:'No concentration! Minimum AC 17 works while unarmored or in Wild Shape.'},
'darkvision':{n:'Darkvision',lv:2,sc:'Transmutation',conc:false,time:'Action',range:'Touch',desc:'Grant Darkvision 60 ft for 8 hours. No concentration.',tip:'Give to party members without darkvision before a dungeon.'},
'dust-devil':{n:'Dust Devil',lv:2,sc:'Conjuration',conc:true,time:'Action',range:'60 ft',desc:'5-ft cube spinning column: STR save or 1d8 bludgeoning + moved 10 ft away. Difficult terrain. Bonus action: move 30 ft. Scales: +1d8 per slot. (Conc, 1 min)',tip:'Cheap damage + area denial + bonus action movement.'},
'earthbind':{n:'Earthbind',lv:2,sc:'Transmutation',conc:true,time:'Action',range:'300 ft',desc:'STR save or flying speed becomes 0, creature descends 60 ft/round (no fall damage). (Conc, 1 min)',tip:'300 ft range. Bring down flying enemies safely.'},
'flame-blade':{n:'Flame Blade',lv:2,sc:'Evocation',conc:true,time:'Bonus',range:'Self',desc:'Bonus action. Scimitar-like blade of fire. Melee spell attack: 3d6 fire. Sheds light. Scales: +1d6 per 2 slots. (Conc, 10 min)',tip:'Strong for melee Druids. WIS-based, magic damage, free light source.'},
'flaming-sphere':{n:'Flaming Sphere',lv:2,sc:'Conjuration',conc:true,time:'Action',range:'60 ft',desc:'5-ft sphere: DEX save or 2d6 fire on adjacent creatures. Bonus action: move 30 ft. Scales: +2d6 per slot. (Conc, 1 min)',tip:'Bonus action to attack = use your action for something else. Great action economy.'},
'gust-of-wind':{n:'Gust of Wind',lv:2,sc:'Evocation',conc:true,time:'Action',range:'Self 60ft',desc:'60-ft line: STR save or pushed 15 ft. Difficult terrain vs movement into wind. Gas/vapors dispersed. (Conc, 1 min)',tip:'Dispel Cloudkill, Stinking Cloud. Push enemies off ledges.'},
'healing-spirit':{n:'Healing Spirit',lv:2,sc:'Conjuration',conc:true,time:'Bonus',range:'60 ft',desc:'Invisible spirit in 5-ft cube. Creature there at turn start (or enters): heals 1d6. Max = 1 + WIS mod total heals. Move as bonus action. (Conc, 1 min)',tip:'Incredibly efficient healing over time. Park it on the tank.'},
'heat-metal':{n:'Heat Metal',lv:2,sc:'Transmutation',conc:true,time:'Action',range:'60 ft',desc:'Metal object sears: 2d8 fire + CON save or drop it. Bonus action each turn for free to repeat. Metal armor: Disadvantage on attacks/checks. (Conc, 1 min)',tip:'Destroys armored enemies. Force them to drop weapons. Bonus action sustained.'},
'protection-from-poison':{n:'Protection from Poison',lv:2,sc:'Abjuration',conc:false,time:'Action',range:'Touch',desc:'If poisoned: neutralize one poison. Advantage on saves vs poison. Resistance to poison damage. 1 hour, no concentration.',tip:'Pre-cast before fighting poisonous creatures. No concentration = cheap insurance.'},
'summon-beast':{n:'Summon Beast',lv:2,sc:'Conjuration',conc:true,time:'Action',range:'90 ft',desc:'Summon a Beast Spirit (Air/Land/Water). Uses your spell attack/DC. Scales with slot level. (Conc, 1 hr)',tip:'Solid damage concentration. Air Spirit can fly. Land has extra attacks at higher levels.'},
'wither-and-bloom':{n:'Wither and Bloom',lv:2,sc:'Necromancy',conc:false,time:'Action',range:'60 ft',desc:'CON save or 2d6 necrotic in 10-ft sphere. One creature of choice in area heals 1d6 + WIS mod instead. Scales: +1d6 per slot.',tip:'Selective AOE + healing in one action.'},
'erupting-earth':{n:'Erupting Earth',lv:3,sc:'Transmutation',conc:false,time:'Action',range:'120 ft',desc:'DEX save or 3d12 bludgeoning in 20-ft cube (half on save). Creates difficult terrain (rubble). Scales: +1d12 per slot.',tip:'Large AOE damage + permanent difficult terrain. No concentration!'},
'plant-growth':{n:'Plant Growth',lv:3,sc:'Transmutation',conc:false,time:'Action',range:'150 ft',desc:'100-ft radius: difficult terrain (4× movement cost) for 24 hours. OR 8-hr casting: enrich soil for bountiful harvest.',tip:'4× movement cost means enemies spend their whole turn moving 10 ft. Brutal.'},
'sleet-storm':{n:'Sleet Storm',lv:3,sc:'Conjuration',conc:true,time:'Action',range:'150 ft',desc:'20-ft radius cylinder: difficult terrain, DEX save or fall prone when entering/starting there. Heavy obscurement. (Conc, 1 min)',tip:'Triple control: difficult terrain + prone + heavy obscurement. Locks down a zone.'},
'speak-with-plants':{n:'Speak with Plants',lv:3,sc:'Transmutation',conc:false,time:'Action',range:'Self 30ft',desc:'Plants understand you and can answer questions. Can animate plants to entangle (STR save or restrained 1 min). 10 min.',tip:'Scout nearby enemies through plants. Entangle surprise. Nature scouting.'},
'summon-fey':{n:'Summon Fey',lv:3,sc:'Conjuration',conc:true,time:'Action',range:'90 ft',desc:'Summon Fey Spirit (Fuming/Mirthful/Tricksy). Uses your spell attack/DC. Scales with slot. (Conc, 1 hr)',tip:'Mirthful fey adds Charmed. Tricksy fey can go invisible. Flexible utility summon.'},
'tidal-wave':{n:'Tidal Wave',lv:3,sc:'Conjuration',conc:false,time:'Action',range:'120 ft',desc:'30-ft long, 10-ft wide wave: DEX save or 4d8 bludgeoning + knocked prone (half on save). Creates difficult terrain. No concentration.',tip:'No concentration AOE. Prone + difficult terrain. Excellent vs grouped enemies.'},
'water-breathing':{n:'Water Breathing',lv:3,sc:'Transmutation',conc:false,time:'Action',range:'30 ft',desc:'Up to 10 creatures can breathe underwater for 24 hours. No concentration. Can be ritual cast.',tip:'Ritual cast before underwater missions. Zero slot cost.'},
'wind-wall':{n:'Wind Wall',lv:3,sc:'Evocation',conc:true,time:'Action',range:'120 ft',desc:'60-ft long, 15-ft high wall: STR save or 3d8 bludgeoning. Ranged projectiles have Disadvantage through it. (Conc, 1 min)',tip:'Stop ranged attackers. Redirect gas clouds. Prevent enemy archers.'},
'charm-monster':{n:'Charm Monster',lv:4,sc:'Enchantment',conc:false,time:'Action',range:'30 ft',desc:'WIS save or charmed for 1 hour. Works on ANY creature type. No concentration. +1 target per slot.',tip:'No concentration! Charm a dragon, giant, or elemental. Remove from combat.'},
'confusion':{n:'Confusion',lv:4,sc:'Enchantment',conc:true,time:'Action',range:'90 ft',desc:'WIS save or confused (random behavior: wander, do nothing, attack nearest). Repeat save each turn. 10-ft radius. (Conc, 1 min)',tip:'Random attacks include allies. Drop on a clustered group. Even partial success good.'},
'grasping-vine':{n:'Grasping Vine',lv:4,sc:'Conjuration',conc:true,time:'Bonus',range:'60 ft',desc:'Bonus action. Animate a vine: DEX save or pulled 20 ft toward it. Move as bonus action. (Conc, 1 min)',tip:'Bonus action cast + bonus action to pull. Drag enemies into hazards each turn.'},
'summon-elemental':{n:'Summon Elemental',lv:4,sc:'Conjuration',conc:true,time:'Action',range:'90 ft',desc:'Summon an Elemental Spirit (Air/Earth/Fire/Water). Uses your spell attack/DC. Scales with slot. (Conc, 1 hr)',tip:'Air elemental can fly. Earth is tanky. Fire damages nearby enemies. Water can grapple.'},
'awaken':{n:'Awaken',lv:5,sc:'Transmutation',conc:false,time:'8hr',range:'Touch',desc:'8 hr casting. Touch a beast or plant. Grants INT 10 (min), one language, memory. Becomes friendly for 30 days. Requires 1,000 gp agate.',tip:'Permanent animal companion. Awakened trees can grapple. Loyal bodyguards.'},
'maelstrom':{n:'Maelstrom',lv:5,sc:'Evocation',conc:true,time:'Action',range:'120 ft',desc:'30-ft radius whirlpool: STR save or 6d6 bludgeoning + pulled 10 ft toward center each turn. Difficult terrain. (Conc, 1 min)',tip:'Massive pull + damage. Pull enemies into Spike Growth or Wall of Fire.'},
'reincarnate':{n:'Reincarnate',lv:5,sc:'Necromancy',conc:false,time:'1hr',range:'Touch',desc:'Restore creature dead ≤10 days in a new random body (species determined by d100). Retains memories and class. Requires 1,000 gp oils.',tip:'No material restriction on body condition. Can restore with no remains left.'},
'tree-stride':{n:'Tree Stride',lv:5,sc:'Conjuration',conc:true,time:'Action',range:'Self',desc:'Enter a tree and teleport to any tree of same species within 500 ft as part of movement. Once per turn. (Conc, 1 min)',tip:'500-ft teleport per turn in forested areas. Bypasses walls and enemies.'},
'wall-of-stone':{n:'Wall of Stone',lv:5,sc:'Evocation',conc:true,time:'Action',range:'120 ft',desc:'Six 10×10 stone panels (6 in thick). Becomes permanent if Conc maintained for full 10 min. DEX save or trapped when it forms. (Conc, 10 min)',tip:'Divide battlefield, seal doors. Build permanent fortifications after 10 min.'},
'bones-of-the-earth':{n:'Bones of the Earth',lv:6,sc:'Transmutation',conc:false,time:'Action',range:'120 ft',desc:'Up to 6 stone pillars shoot up. DEX save or 6d6 bludgeoning + prone at pillar location. Each 5 ft wide, 30 ft tall.',tip:'No concentration AOE + difficult terrain + prone. Creates maze of pillars.'},
'move-earth':{n:'Move Earth',lv:6,sc:'Transmutation',conc:true,time:'Action',range:'120 ft',desc:'Reshape dirt, sand, or clay in 40-ft cube. Each action: reshape up to 10 ft. Change slopes, fill trenches. (Conc, 2 hr)',tip:'Shape entire battlefields over time. Create fortifications permanently.'},
'primordial-ward':{n:'Primordial Ward',lv:6,sc:'Abjuration',conc:true,time:'Action',range:'Self',desc:'Resistance to acid, cold, fire, lightning, thunder. When hit by one of these: immunity to that type for rest of combat. (Conc, 1 min)',tip:'First hit of any element grants immunity to it for the rest of the fight.'},
'transport-via-plants':{n:'Transport via Plants',lv:6,sc:'Conjuration',conc:false,time:'Action',range:'10 ft',desc:'Enter a Large+ plant. Teleport to any plant of same species anywhere on same plane. One-way trip per casting.',tip:'Instant cross-continent teleportation if you know where a tree of the same species is.'},
'wall-of-thorns':{n:'Wall of Thorns',lv:6,sc:'Conjuration',conc:true,time:'Action',range:'120 ft',desc:'60-ft wall (10 ft thick, 10 ft tall): DEX save or 7d8 piercing to pass through (half on save). Difficult terrain. +1d8 per slot. (Conc, 10 min)',tip:'Impenetrable wall for 10 min. 7d8 avg 31 piercing to traverse.'},
'wind-walk':{n:'Wind Walk',lv:6,sc:'Transmutation',conc:false,time:'1min',range:'30 ft',desc:'Up to 10 creatures become gaseous and gain Fly 300 ft (hover) for 8 hours. Revert as bonus action (1 min). No concentration.',tip:'Fastest travel spell. 300-ft fly speed, no concentration, 8 hours, entire party.'},
'reverse-gravity':{n:'Reverse Gravity',lv:7,sc:'Transmutation',conc:true,time:'Action',range:'100 ft',desc:'100-ft cylinder (50-ft radius): gravity reverses 1 min. Unsecured creatures DEX save or fall upward. Fall damage when gravity ends. (Conc, 1 min)',tip:'Throw the entire encounter upward. When concentration ends, everything falls for 10d6.'},
'mirage-arcane':{n:'Mirage Arcane',lv:7,sc:'Illusion',conc:false,time:'10min',range:'Sight',desc:'10-min casting. Alter appearance of 1-mile-square terrain for 10 days. Creatures can physically interact with the illusion.',tip:'Fortify a settlement with illusory walls. Hide an entire valley.'},
'whirlwind':{n:'Whirlwind',lv:7,sc:'Evocation',conc:true,time:'Action',range:'300 ft',desc:'10-ft radius, 30-ft column: DEX save or 10d6 bludgeoning + trapped inside (STR save to escape). Trapped: blinded, can\'t breathe. Move 30 ft/action. (Conc, 1 min)',tip:'Brutal single/multi-target control. Trap and blind enemies.'},
'animal-shapes':{n:'Animal Shapes',lv:8,sc:'Transmutation',conc:true,time:'Action',range:'30 ft',desc:'Transform up to 8 willing creatures into beast forms of CR 4 or lower. (Conc, 24 hrs)',tip:'Turn the whole party into wolves or Giant Eagles for 24-hour travel.'},
'tsunami':{n:'Tsunami',lv:8,sc:'Conjuration',conc:true,time:'1min',range:'Sight',desc:'300-ft tall, 300-ft wide wall of water. STR save or 6d10 bludgeoning per round. Wall moves 50 ft from you each round. Weakens each round. (Conc, 6 rounds)',tip:'Colossal AOE tide. Best used outdoors near water.'},
'incendiary-cloud':{n:'Incendiary Cloud',lv:8,sc:'Conjuration',conc:true,time:'Action',range:'150 ft',desc:'20-ft radius sphere: DEX save or 10d8 fire (half on save). Moves 10 ft/round. Heavily obscured. (Conc, 1 min)',tip:'10d8/round + blocks vision. Move toward enemies each turn.'},
'storm-of-vengeance':{n:'Storm of Vengeance',lv:9,sc:'Conjuration',conc:true,time:'Action',range:'Sight',desc:'1-mile radius storm. Round 1: 20d6 thunder + deafened. Rounds 2-10: acid rain (1d6), lightning/hail (10d6), wind (Disadvantage ranged). Each round different. (Conc, 1 min)',tip:'Total battlefield domination. Chain effects every round.'},
'shapechange':{n:'Shapechange',lv:9,sc:'Transmutation',conc:true,time:'Action',range:'Self',desc:'Transform into any creature with CR ≤ druid level. Retain mental stats, class features, and spellcasting. DC10+dmg CON save to stay transformed at 0 HP. (Conc, 1 hr)',tip:'Become a Solar (CR 21) or Ancient Dragon while keeping your druid spellcasting.'},

// ── ABERRANT MIND extra spells (stored by name in selC/selS) ──
'acid-splash':{n:'Acid Splash',lv:0,sc:'Conjuration',conc:false,time:'Action',range:'60 ft',desc:'DEX save or 1d6 Acid. Can target 2 creatures within 5 ft of each other. Scales at 5/11/17.',tip:'Multi-target option at close range. Good vs creatures without acid resistance.'},
