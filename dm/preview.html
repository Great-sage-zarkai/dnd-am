// ══ STATE ══
const STORAGE_KEY = 'dm_party';
let party = []; // array of {state, slot} objects
let activeSlot = 0;
let expandedSpells = new Set();
let camStream = null;
let camScanning = false;

function g(id){return document.getElementById(id);}
function prof(lv){return lv<5?2:lv<9?3:lv<13?4:lv<17?5:6;}
function mod(n){return Math.floor((n-10)/2);}
function fmod(n){return (n>=0?'+':'')+n;}

const CLASS_COLOR = {cleric:'#7B5EA7',druid:'#5A7C2E',rogue:'#3A7CA5',sorcerer:'#7F77DD'};
const CLASS_ICON = {cleric:'🪦',druid:'🌿',rogue:'🗡️',sorcerer:'🌀'};
const CLASS_LABEL = {cleric:'Grave Cleric',druid:'Circle of the Moon Druid',rogue:'Arcane Trickster Rogue',sorcerer:'Aberrant Mind Sorcerer'};
const SLOT_TABLE=[[0,0,0,0,0,0,0,0,0],[2,0,0,0,0,0,0,0,0],[3,0,0,0,0,0,0,0,0],[4,2,0,0,0,0,0,0,0],[4,3,0,0,0,0,0,0,0],[4,3,2,0,0,0,0,0,0],[4,3,3,0,0,0,0,0,0],[4,3,3,1,0,0,0,0,0],[4,3,3,2,0,0,0,0,0],[4,3,3,3,1,0,0,0,0],[4,3,3,3,2,0,0,0,0],[4,3,3,3,2,1,0,0,0],[4,3,3,3,2,1,0,0,0],[4,3,3,3,2,1,1,0,0],[4,3,3,3,2,1,1,0,0],[4,3,3,3,2,1,1,1,0],[4,3,3,3,2,1,1,1,0],[4,3,3,3,2,1,1,1,1],[4,3,3,3,3,1,1,1,1],[4,3,3,3,3,2,1,1,1],[4,3,3,3,3,2,2,1,1]];
const SLOT_LABEL=['1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
const DOMAIN_IDS={1:['bane','false-life'],3:['gentle-repose','ray-of-enfeeblement'],5:['revivify','vampiric-touch'],7:['blight','death-ward'],9:['antilife-shell','raise-dead']};

function saveParty(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(party));}catch(e){}}
function loadParty(){try{const d=localStorage.getItem(STORAGE_KEY);if(d)party=JSON.parse(d);}catch(e){party=[];}}

function decodeSnapshot(raw){
  // raw can be a full URL or just the base64 part
  let b64 = raw.trim();
  const m = b64.match(/[?&]d=([^&]+)/);
  if(m) b64 = decodeURIComponent(m[1]);
  const json = decodeURIComponent(escape(atob(b64)));
  return JSON.parse(json);
}

function addCharacter(state){
  // Replace existing slot for same class, otherwise add new
  const existing = party.findIndex(p => p.state.charClass === state.charClass);
  if(existing >= 0){
    party[existing] = {state, slot: existing};
  } else {
    party.push({state, slot: party.length});
  }
  saveParty();
  renderAll();
  // Switch to the newly loaded character
  const idx = party.findIndex(p => p.state.charClass === state.charClass);
  switchChar(idx);
}

function removeChar(idx){
  party.splice(idx, 1);
  party.forEach((p,i) => p.slot = i);
  saveParty();
  activeSlot = Math.min(activeSlot, party.length - 1);
  renderAll();
}

// ══ RENDER ══
function renderAll(){
  renderTabs();
  renderScreens();
  updatePartySub();
}

function renderTabs(){
  const tabs = g('char-tabs');
  const noChars = g('no-chars');
  const screens = g('char-screens');
  noChars.style.display = party.length ? 'none' : '';
  screens.style.display = party.length ? '' : 'none';

  if(!party.length){tabs.innerHTML='';return;}
  tabs.innerHTML = party.map((p,i) => {
    const cls = p.state.charClass || 'unknown';
    const color = CLASS_COLOR[cls] || '#888';
    const name = p.state.name || p.state.c_name || CLASS_LABEL[cls] || 'Character';
    return `<button class="char-tab${i===activeSlot?' active':''}" onclick="switchChar(${i})">
      <div class="ct-dot" style="background:${color}"></div>
      ${name}
      <span class="ct-del" onclick="event.stopPropagation();removeChar(${i})">✕</span>
    </button>`;
  }).join('');
}

function renderScreens(){
  const el = g('char-screens');
  el.innerHTML = party.map((p,i) => `<div class="char-screen${i===activeSlot?' active':''}" id="screen-${i}">${buildCharScreen(p.state, i)}</div>`).join('');
}

function switchChar(idx){
  activeSlot = idx;
  document.querySelectorAll('.char-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.char-screen').forEach((s,i) => s.classList.toggle('active', i===idx));
}

function updatePartySub(){
  const sub = g('party-sub');
  if(!party.length){sub.textContent='No characters loaded'; return;}
  sub.textContent = party.map(p => p.state.name || p.state.c_name || '?').join(' · ');
}

function buildCharScreen(s, idx){
  // Robust class detection — handles old snapshots without charClass
  const cls = s.charClass || detectClass(s) || 'unknown';
  const color = CLASS_COLOR[cls] || '#8888AA';
  const icon = CLASS_ICON[cls] || '🎲';
  const name = s.name || s.c_name || CLASS_LABEL[cls] || 'Character';
  const lv = s.lv || 1;
  // Aberrant Mind stores stats as top-level strings (s.str, s.wis...),
  // Cleric/Druid store as s.stats object
  const stats = s.stats || {
    str:+(s.str||10), dex:+(s.dex||10), con:+(s.con||12),
    int:+(s.int_||s.int||10), wis:+(s.wis||10), cha:+(s.cha||10)
  };
  const p = prof(lv);

  // HP calc
  const wismod = mod(stats.wis||10), conmod = mod(stats.con||12);
  let mhp = s.maxHpMan > 0 ? s.maxHpMan : (8 + conmod + (lv-1)*(5+conmod));
  const curHp = s.curHp ?? mhp;
  const tmpHp = s.tmpHp || 0;
  const pct = mhp > 0 ? Math.max(0, curHp/mhp*100) : 0;
  const hpColor = pct>60?'#1D9E75':pct>30?'#C4A21B':'#D85A30';

  // Spell slots
  const tbl = SLOT_TABLE[Math.min(lv,20)] || [];
  const slots = s.slots || [...tbl];

  // ── Spell extraction (handles all 4 apps) ──
  // Cleric/Druid: prepared=array of IDs, myCantrips=array of IDs
  // Aberrant Mind: selC=array of names, selS=array of names
  // Rogue: no spells
  function nameToId(n){ return n.toLowerCase().replace(/['']/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
  const allSpellIds = new Set();
  if(s.prepared)    s.prepared.forEach(id => allSpellIds.add(id));
  if(s.myCantrips)  s.myCantrips.forEach(id => allSpellIds.add(id));
  if(s.selC)        s.selC.forEach(name => allSpellIds.add(nameToId(name)));
  if(s.selS)        s.selS.forEach(name => allSpellIds.add(nameToId(name)));
  // Aberrant Mind: psionic spells are always prepared (not saved in selC/selS)
  if(cls === 'sorcerer'){
    ['mind-sliver','dissonant-whispers','arms-of-hadar','calm-emotions','detect-thoughts',
     'hunger-of-hadar','sending','summon-aberration','evards-black-tentacles',
     'raulothims-psychic-lance','dominate-person','telekinesis'
    ].forEach(id => allSpellIds.add(id));
  }

  // Domain spells (cleric)
  const domainIds = new Set();
  if(cls === 'cleric'){
    Object.entries(DOMAIN_IDS).forEach(([r,a]) => { if(lv>=+r) a.forEach(id => domainIds.add(id)); });
    // Also add domain spells to the full list so they always appear
    domainIds.forEach(id => allSpellIds.add(id));
  }

  // Concentration
  const concSpell = s.concSpell || s.concSp || null;

  let h = '';

  // Hero card
  h += `<div class="char-hero" style="background:linear-gradient(135deg,${color}22,${color}11);border:1px solid ${color}44">
    <div class="ch-badge" style="background:${color}33;font-size:26px">${icon}</div>
    <div class="ch-info">
      <div class="ch-name">${name}</div>
      <div class="ch-sub">${CLASS_LABEL[cls]||cls} · Lv ${lv} · ${s.species||s.species||'?'} · ${s.bg||'?'}</div>
      <div class="ch-hp-row">
        <div><div class="ch-hp-num">${curHp}${tmpHp>0?`<span style="font-size:14px;color:var(--td)"> +${tmpHp}</span>`:''}</div><div class="ch-hp-label">/ ${mhp} HP</div></div>
        <div class="ch-hp-bar"><div class="ch-hp-fill" style="width:${pct}%;background:${hpColor}"></div></div>
      </div>
      ${concSpell ? `<div class="conc-pill">🌀 Concentrating: ${concSpell}</div>` : ''}
    </div>
  </div>`;

  // Resources
  h += buildResources(s, cls, lv, slots, tbl, color);

  // Class Features
  const features = (CLASS_FEATURES[cls] ? CLASS_FEATURES[cls](s) : []);
  if(features.length){
    h += `<div class="sec-title">Class Abilities & Passives</div>`;
    features.forEach(f => {
      h += `<div class="trait-card${f.gold?' gold':''}">
        <div class="trait-nm">${f.n}</div>
        <div class="trait-ds">${f.ds.replace(/\n/g,'<br>')}</div>
      </div>`;
    });
  }

  // Spells
  // Lookup: try exact ID, then fuzzy, then full-scan by name, then placeholder
  function slugify(n){ return n.toLowerCase().replace(/['']/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
  function lookupSpell(id){
    if(SPELLS[id]) return SPELLS[id];
    // Try without class suffix (-d, -s, -r)
    const base = id.replace(/-[dsr]$/, '');
    if(SPELLS[base]) return SPELLS[base];
    // Full scan: find a spell whose name slugifies to this id (handles apostrophes like "Evard's")
    const found = Object.values(SPELLS).find(sp => slugify(sp.n) === id);
    if(found) return found;
    // Placeholder — still shows the spell name so DM can see it
    const niceName = id.split('-').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
    return {n:niceName, lv:0, sc:'Unknown', conc:false, time:'—', range:'—', desc:'Full description not in DM database.', tip:''};
  }

  const matchedSpells = [...allSpellIds].map(id => ({id, sp: lookupSpell(id)}))
    .sort((a,b) => a.sp.lv - b.sp.lv);

  // Debug panel — always shown so we can diagnose
  h += `<div style="background:#1a1a2a;border:1px solid #444;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#8888aa;font-family:monospace">
    <div style="color:#aaa;margin-bottom:4px">🔍 Debug</div>
    <div>class: <b style="color:#c0aaea">${cls}</b> · spellIds: <b style="color:#6dcfb0">${allSpellIds.size}</b></div>
    <div style="margin-top:2px;word-break:break-all">${[...allSpellIds].slice(0,8).join(', ')}${allSpellIds.size>8?'...':''}</div>
    <div style="margin-top:2px">prepared: ${(s.prepared||[]).length} · cantrips: ${(s.myCantrips||[]).length} · selC: ${(s.selC||[]).length} · selS: ${(s.selS||[]).length}</div>
  </div>`;

  if(matchedSpells.length){
    h += `<div class="sec-title">Spells (${matchedSpells.length})</div>`;
    let curLv = -1;
    matchedSpells.forEach(({id, sp}) => {
      if(sp.lv !== curLv){
        curLv = sp.lv;
        h += `<div style="font-size:10px;font-weight:700;color:var(--os);text-transform:uppercase;letter-spacing:.6px;margin:8px 0 4px">${sp.lv===0?'Cantrips':SLOT_LABEL[sp.lv-1]+' Level'}</div>`;
      }
      const isDom = domainIds.has(id);
      const exp = expandedSpells.has(`${idx}-${id}`);
      const concBadge = sp.conc ? `<span class="badge bt">C</span>` : '';
      h += `<div class="spell-card${isDom?' domain':''}${concSpell===sp.n?' conc':''}" onclick="toggleSpell(${idx},'${id}')">
        <div class="sc-header">
          <div class="sc-name">${sp.n}</div>
          <div class="sc-badges">
            ${isDom?'<span class="badge ba">☽</span>':''}
            ${concBadge}
            <span class="badge bg">${sp.sc}</span>
          </div>
        </div>
        <div class="sc-meta">${sp.time} · ${sp.range}</div>
        ${exp ? `<div class="sc-body open">
          <div class="sc-desc">${sp.desc}</div>
          ${sp.tip ? `<div class="sc-tip">💡 ${sp.tip}</div>` : ''}
        </div>` : ''}
      </div>`;
    });
  } else {
    h += `<div style="color:var(--os);font-size:13px;text-align:center;padding:20px">No spells loaded yet — scan the character QR.</div>`;
  }

  return h;
}

function buildResources(s, cls, lv, slots, tbl, color){
  let h = `<div class="res-section">`;

  // Spell slots
  let hasSlots = false;
  for(let i=0;i<9;i++){if(tbl[i]>0){hasSlots=true;break;}}
  if(hasSlots){
    h += `<div style="font-size:10px;font-weight:700;color:var(--os);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Spell Slots</div>`;
    for(let i=0;i<9;i++){
      const tot=tbl[i]; if(!tot) continue;
      const cur=slots[i]??tot;
      const pips=Array.from({length:tot},(_,j)=>`<div class="spip${j<cur?'':' e'}"></div>`).join('');
      h += `<div class="slot-row"><span class="slot-lv">${SLOT_LABEL[i]}</span><div class="slot-pips">${pips}</div><span class="slot-ct">${cur}/${tot}</span></div>`;
    }
    h += `<div style="height:8px"></div>`;
  }

  // Class-specific resources
  const resRows = [];
  if(cls==='cleric'){
    const cdMax=lv>=18?4:lv>=6?3:lv>=2?2:0;
    if(cdMax>0) resRows.push({n:'Channel Divinity',max:cdMax,used:s.cdUsed||0});
    const wismod=Math.max(1,mod(s.stats?.wis||16));
    resRows.push({n:'Eyes of the Grave',max:wismod,used:s.eyesUsed||0});
    if(lv>=6) resRows.push({n:"Sentinel at Death's Door",max:wismod,used:s.sentinelUsed||0});
    if(lv>=10) resRows.push({n:'Divine Intervention',max:1,used:s.divIntUsed?1:0});
  }
  if(cls==='druid'){
    const wsMax=lv>=17?4:lv>=9?3:2;
    resRows.push({n:'Wild Shape',max:wsMax,used:(s.wsUses!==undefined)?wsMax-s.wsUses:0});
  }
  if(cls==='sorcerer'){
    const sp=lv<=9?lv:lv>=17?12:lv>=13?11:10;
    resRows.push({n:'Sorcery Points',max:sp,used:s.usedSP||0});
    if(lv>=1) resRows.push({n:'Innate Sorcery',max:prof(lv),used:s.innLeft!==undefined?prof(lv)-s.innLeft:0});
  }
  if((s.gcFeats||[]).includes('lucky') || (s.selF||[]).includes('lucky')){
    resRows.push({n:'Lucky',max:3,used:s.luckyUsed||0});
  }

  if(resRows.length){
    resRows.forEach(r => {
      const pips=Array.from({length:Math.min(r.max,10)},(_,i)=>`<div class="rpip${i<r.used?' e':' f'}" style="border-color:${color}${i<r.used?'':'88'};${i<r.used?'':'background:'+color+'33'}"></div>`).join('');
      h+=`<div class="res-row"><span class="res-nm">${r.n}</span><div class="res-pips">${pips}</div><span class="res-ct">${r.max-r.used}/${r.max}</span></div>`;
    });
  }

  h += `</div>`;
  return h;
}

function toggleSpell(charIdx, spellId){
  const key = `${charIdx}-${spellId}`;
  if(expandedSpells.has(key)) expandedSpells.delete(key);
  else expandedSpells.add(key);
  // Re-render just the active screen
  const el = document.getElementById(`screen-${charIdx}`);
  if(el) el.innerHTML = buildCharScreen(party[charIdx].state, charIdx);
}

// ══ LOAD MODAL ══
function openLoadModal(){
  g('modal-body').innerHTML = `
    <div class="load-option" onclick="showUrlInput()">
      <h3>🔗 Paste Share URL</h3>
      <p>Player copies their URL from the Share button and sends it to you</p>
    </div>
    <div class="load-option" onclick="showCamera()">
      <h3>📷 Scan QR Code</h3>
      <p>Point camera at the player's QR code on their phone screen</p>
    </div>`;
  g('load-modal').classList.add('open');
}

function closeModal(){
  stopCamera();
  g('load-modal').classList.remove('open');
}

function showUrlInput(){
  g('modal-body').innerHTML = `
    <p style="font-size:12px;color:var(--os);margin-bottom:8px">Ask the player to tap the Share button (on the Tracker tab) and send you the URL.</p>
    <textarea class="url-input" id="url-input" rows="4" placeholder="Paste the full URL or just the base64 data here..."></textarea>
    <button class="btn-load" onclick="loadFromUrl()">Load Character</button>
    <button class="btn-load" style="background:var(--sv);color:var(--os)" onclick="openLoadModal()">← Back</button>`;
}

function loadFromUrl(){
  const raw = g('url-input')?.value?.trim();
  if(!raw){alert('Please paste a URL first.');return;}
  try{
    const state = decodeSnapshot(raw);
    if(!state.charClass) state.charClass = detectClass(state);
    closeModal();
    addCharacter(state);
  }catch(e){
    alert('Could not read this snapshot. Make sure you pasted the full URL from the Share button.');
  }
}

function detectClass(s){
  if(s.wsUses !== undefined) return 'druid';
  if(s.eyesUsed !== undefined) return 'cleric';
  if(s.sorcPoints !== undefined || s.usedSP !== undefined) return 'sorcerer';
  if(s.identities !== undefined || s.usedWails !== undefined) return 'rogue';
  return 'unknown';
}

// ── QR Camera scan ──
function showCamera(){
  g('modal-body').innerHTML = `
    <p class="cam-hint">Point the camera at the player's QR code</p>
    <div class="cam-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <div class="cam-overlay"><div class="cam-frame"></div></div>
    </div>
    <div id="cam-status" style="text-align:center;font-size:12px;color:var(--os);margin-bottom:8px">Starting camera...</div>
    <button class="btn-load" style="background:var(--sv);color:var(--os)" onclick="stopCamera();openLoadModal()">← Back</button>`;
  startCamera();
}

async function startCamera(){
  try{
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video = g('cam-video');
    video.srcObject = camStream;
    await video.play();
    g('cam-status').textContent = 'Scanning...';
    camScanning = true;
    loadJsQR(()=>scanLoop());
  }catch(e){
    g('cam-status').innerHTML = `<span style="color:var(--r)">Camera not available. Use "Paste URL" instead.</span>`;
  }
}

function stopCamera(){
  camScanning = false;
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}

function loadJsQR(cb){
  if(window.jsQR){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
  s.onload=cb;s.onerror=()=>{g('cam-status').innerHTML='<span style="color:var(--r)">QR library failed to load. Use Paste URL.</span>';};
  document.head.appendChild(s);
}

function scanLoop(){
  if(!camScanning) return;
  const video = g('cam-video');
  if(!video || video.readyState < 2){setTimeout(()=>scanLoop(),200);return;}
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const code = window.jsQR && window.jsQR(img.data, img.width, img.height);
  if(code && code.data){
    stopCamera();
    try{
      const state = decodeSnapshot(code.data);
      if(!state.charClass) state.charClass = detectClass(state);
      closeModal();
      addCharacter(state);
      return;
    }catch(e){
      g('cam-status').innerHTML='<span style="color:var(--r)">QR read but data not recognized. Try paste URL.</span>';
    }
  }
  if(camScanning) requestAnimationFrame(scanLoop);
}

// ══ INIT ══
window.addEventListener('load', () => {
  loadParty();
  renderAll();
  if(party.length) switchChar(0);
});
