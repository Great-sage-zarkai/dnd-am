<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#3A2E60">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<title>Grave Cleric</title>
<style>
/* ===== RESET & ROOT ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#5C4A8A;
  --pl:#EDE8F5;
  --pd:#3A2E60;
  --acc:#C4A21B;
  --accl:#F7EFD4;
  --neg:#7B1F1F;
  --ngl:#FDECEA;
  --heal:#1B5E3A;
  --heall:#E8F5EF;
  --bg:#F5F2FA;
  --card:#FFFFFF;
  --border:#D0C4E8;
  --text:#2A2040;
  --muted:#7A6A9A;
  --shadow:rgba(60,40,100,0.13);
  --radius:12px;
  --r6:6px;
}

/* ===== BASE ===== */
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:var(--text)}
a{color:var(--p)}

/* ===== HEADER ===== */
#header{
  background:linear-gradient(135deg,var(--pd) 0%,var(--p) 100%);
  color:#fff;padding:10px 14px 6px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px var(--shadow);
}
#header-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))}
#header-info{flex:1;min-width:0}
#char-name-display{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.3px}
#header-sub{font-size:12px;opacity:0.78;margin-top:1px;display:flex;gap:8px;align-items:center}
#deity-badge{background:rgba(196,162,27,0.25);border:1px solid rgba(196,162,27,0.5);border-radius:20px;padding:1px 8px;font-size:11px;color:#f5dfa0}
#lang-btns{display:flex;gap:4px}
.lb{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;transition:background 0.15s,color 0.15s}
.lb.active{background:#fff;color:var(--pd)}
#hp-bar-wrap{height:4px;background:rgba(255,255,255,0.15);margin-top:6px;border-radius:2px;overflow:hidden}
#hp-bar{height:100%;background:linear-gradient(90deg,#e05252,#f4a261);border-radius:2px;transition:width 0.3s}

/* ===== TABS ===== */
#tabbar{
  display:flex;background:var(--pd);
  position:sticky;top:64px;z-index:99;
  border-bottom:2px solid var(--acc);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 2px 4px;gap:2px;color:rgba(255,255,255,0.55);
  transition:color 0.15s,background 0.15s;position:relative;
}
.tab-btn.active{color:#fff}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--acc)}
.tab-btn img{width:22px;height:22px;object-fit:contain;opacity:0.6;transition:opacity 0.15s;filter:brightness(5)}
.tab-btn.active img{opacity:1}
.tab-btn span{font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

/* ===== SCROLL AREA ===== */
#main{flex:1;overflow-y:auto;padding:0 0 80px}
.tab-pane{display:none;padding:10px}
.tab-pane.active{display:block}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px var(--shadow);margin-bottom:10px;overflow:hidden}
.card-header{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.card-header img{width:20px;height:20px;object-fit:contain;opacity:0.7}
.card-header h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);flex:1}
.card-body{padding:12px 14px}

/* ===== FORM ELEMENTS ===== */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-row.single{grid-template-columns:1fr}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select,.field textarea{
  width:100%;border:1.5px solid var(--border);border-radius:var(--r6);
  padding:7px 9px;background:var(--bg);font-size:14px;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(92,74,138,0.12)}
.field textarea{min-height:80px;resize:vertical;line-height:1.5}

/* ===== STAT BOXES ===== */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{
  text-align:center;background:var(--pl);border:1.5px solid var(--border);
  border-radius:var(--r6);padding:8px 4px 6px;cursor:pointer;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.stat-box:hover{border-color:var(--p);box-shadow:0 0 0 2px rgba(92,74,138,0.1)}
.stat-box .stat-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted)}
.stat-box .stat-val{font-size:22px;font-weight:700;color:var(--p);line-height:1.1;margin:2px 0}
.stat-box .stat-mod{font-size:13px;font-weight:600;color:var(--text)}
.stat-box input.stat-input{
  width:100%;text-align:center;border:none;background:transparent;
  font-size:22px;font-weight:700;color:var(--p);padding:0;
  -moz-appearance:textfield;
}
.stat-box input.stat-input::-webkit-inner-spin-button{display:none}

/* ===== DERIVED STATS ===== */
.derived-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.derived-box{background:var(--pl);border-radius:var(--r6);padding:8px 4px;text-align:center}
.derived-box .d-val{font-size:20px;font-weight:700;color:var(--p)}
.derived-box .d-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-top:2px}

/* ===== SAVES & SKILLS ===== */
.check-list{display:flex;flex-direction:column;gap:4px}
.check-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.check-item .ci-bonus{font-size:13px;font-weight:700;width:28px;text-align:right;color:var(--p);flex-shrink:0}
.check-item .ci-name{flex:1;font-size:13px}
.check-item .ci-ab{font-size:10px;color:var(--muted);background:var(--pl);border-radius:4px;padding:1px 4px;flex-shrink:0}

/* ===== INVENTORY ===== */
.inv-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.inv-item:last-child{border-bottom:none}
.inv-item input{flex:1;border:1.5px solid var(--border);border-radius:var(--r6);padding:5px 8px;background:var(--bg);font-size:13px}
.inv-item .del-btn{color:var(--muted);font-size:18px;padding:2px 6px;border-radius:4px;transition:color 0.15s}
.inv-item .del-btn:hover{color:var(--neg)}
.add-item-btn{width:100%;padding:8px;background:var(--pl);border:1.5px dashed var(--border);border-radius:var(--r6);color:var(--p);font-size:13px;font-weight:600;margin-top:6px;transition:background 0.15s}
.add-item-btn:hover{background:var(--border)}

/* ===== HP TRACKER ===== */
.hp-display{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0 12px}
.hp-section{text-align:center}
.hp-big{font-size:40px;font-weight:700;color:var(--p);line-height:1}
.hp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-top:2px}
.hp-sep{font-size:28px;color:var(--border);font-weight:300}
.hp-input-row{display:flex;gap:8px;align-items:center}
.hp-input-row input{
  width:70px;text-align:center;border:1.5px solid var(--border);
  border-radius:var(--r6);padding:6px;font-size:16px;font-weight:600;background:var(--bg);
}
.hp-btn{
  flex:1;padding:9px;border-radius:var(--r6);font-size:14px;font-weight:700;
  transition:filter 0.15s;
}
.hp-btn.heal{background:var(--heall);color:var(--heal);border:1.5px solid #b6dfc8}
.hp-btn.dmg{background:var(--ngl);color:var(--neg);border:1.5px solid #f4c2c2}
.hp-btn:hover{filter:brightness(0.95)}
.tmp-row{display:flex;align-items:center;gap:10px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px}
.tmp-row label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.tmp-row input{flex:1;border:1.5px solid var(--border);border-radius:var(--r6);padding:6px;font-size:14px;text-align:center;background:var(--bg)}

/* ===== RESOURCE TRACKER ===== */
.resource-card{margin-bottom:10px}
.resource-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.resource-header .rh-left{display:flex;align-items:center;gap:8px}
.resource-header img{width:20px;height:20px;object-fit:contain;opacity:0.7}
.resource-header h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.resource-header .uses-badge{background:var(--pl);border:1.5px solid var(--border);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;color:var(--p)}
.uses-pips{display:flex;gap:8px;padding:10px 14px;flex-wrap:wrap;align-items:center}
.use-pip{
  width:32px;height:32px;border-radius:50%;border:2.5px solid var(--p);
  background:var(--pl);cursor:pointer;transition:background 0.15s,border-color 0.15s;
  display:flex;align-items:center;justify-content:center;
}
.use-pip.used{background:var(--p);border-color:var(--pd)}
.use-pip.used::after{content:'✕';color:#fff;font-size:14px;font-weight:700}
.use-pip:hover{border-color:var(--pd)}
.use-pip.locked{opacity:0.3;pointer-events:none}
.resource-note{padding:4px 14px 10px;font-size:12px;color:var(--muted);font-style:italic}

/* ===== SPELL SLOTS ===== */
.slot-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.slot-row:last-child{border-bottom:none}
.slot-lvl{font-size:12px;font-weight:700;color:var(--muted);width:28px;flex-shrink:0;text-align:center}
.slot-pips{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.slot-pip{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--p);
  background:var(--pl);cursor:pointer;transition:background 0.15s;flex-shrink:0;
}
.slot-pip.used{background:var(--p)}
.slot-pip.used::after{content:'';display:block;width:8px;height:8px;border-radius:50%;background:#fff;margin:5px auto}
.slot-total{font-size:11px;color:var(--muted);width:40px;text-align:right;flex-shrink:0}

/* ===== CONCENTRATION ===== */
.conc-bar{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(196,162,27,0.08);border-top:1px solid rgba(196,162,27,0.25);
}
.conc-dot{width:12px;height:12px;border-radius:50%;background:var(--acc);flex-shrink:0;box-shadow:0 0 6px rgba(196,162,27,0.5)}
.conc-label{font-size:13px;flex:1}
.conc-end{background:var(--accl);border:1.5px solid var(--acc);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:#5a3d00}

/* ===== REST BUTTONS ===== */
.rest-row{display:flex;gap:8px;padding:10px}
.rest-btn{
  flex:1;padding:10px;border-radius:var(--r6);font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;
  border:1.5px solid var(--border);background:var(--bg);
  transition:background 0.15s,border-color 0.15s;
}
.rest-btn.short{border-color:#e0c070;background:#fffae8;color:#5a3d00}
.rest-btn.long{border-color:var(--p);background:var(--pl);color:var(--pd)}
.rest-btn:hover{filter:brightness(0.95)}
.rest-btn img{width:18px;height:18px;object-fit:contain}

/* ===== SPELLS ===== */
.spell-subtabs{display:flex;background:var(--pl);border-radius:var(--r6);padding:3px;margin-bottom:10px;gap:3px}
.spell-subtab{
  flex:1;text-align:center;padding:7px 4px;border-radius:calc(var(--r6) - 2px);
  font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.spell-subtab.active{background:var(--card);color:var(--p);box-shadow:0 1px 3px var(--shadow)}

.spell-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:var(--card);color:var(--muted);transition:all 0.15s;
}
.chip.active{background:var(--p);border-color:var(--p);color:#fff}
.chip.dom{background:rgba(196,162,27,0.15);border-color:rgba(196,162,27,0.5);color:#5a3d00}

.spell-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r6);
  margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;
}
.spell-card:hover{border-color:var(--p)}
.spell-card.active{border-color:var(--p)}
.spell-card-header{display:flex;align-items:center;gap:8px;padding:9px 12px}
.spell-card-header .sp-name{font-size:14px;font-weight:700;flex:1}
.spell-card-header .sp-level{font-size:11px;font-weight:700;color:var(--muted);background:var(--pl);border-radius:4px;padding:2px 6px;flex-shrink:0}
.spell-conc{color:var(--acc);font-size:12px;font-weight:700;flex-shrink:0}
.spell-dom-badge{background:var(--accl);border:1px solid rgba(196,162,27,0.5);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;color:#5a3d00;flex-shrink:0}
.spell-body{border-top:1px solid var(--border);padding:10px 12px;font-size:13px;line-height:1.5;display:none}
.spell-body.open{display:block}
.spell-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.spell-meta span{font-size:11px;color:var(--muted)}
.spell-meta span strong{color:var(--text)}
.spell-desc{color:var(--text)}
.spell-actions{display:flex;gap:6px;margin-top:8px}
.sp-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;transition:all 0.15s}
.sp-btn.prep{background:var(--pl);color:var(--p);border:1.5px solid var(--border)}
.sp-btn.unprep{background:var(--ngl);color:var(--neg);border:1.5px solid #f4c2c2}
.sp-btn.cast{background:var(--p);color:#fff;border:1.5px solid var(--pd)}
.sp-btn:hover{filter:brightness(0.95)}

.search-bar{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r6);padding:8px 12px;margin-bottom:10px}
.search-bar input{flex:1;border:none;background:none;font-size:14px;outline:none}
.search-bar .srch-icon{font-size:16px;color:var(--muted)}

.empty-msg{text-align:center;padding:30px;color:var(--muted);font-size:14px}
.empty-msg img{width:48px;opacity:0.35;display:block;margin:0 auto 10px}

/* ===== CLASS FEATURES ===== */
.feature-group{margin-bottom:8px}
.feature-group summary{
  list-style:none;display:flex;align-items:center;gap:8px;
  padding:10px 14px;cursor:pointer;background:var(--card);
  border-radius:var(--r6);border:1.5px solid var(--border);
  font-weight:600;font-size:14px;
  transition:border-color 0.15s,background 0.15s;
}
.feature-group summary:hover{border-color:var(--p);background:var(--pl)}
.feature-group[open] summary{border-radius:var(--r6) var(--r6) 0 0;border-color:var(--p);background:var(--pl)}
.feature-group .feat-lv{font-size:10px;font-weight:700;background:var(--p);color:#fff;border-radius:20px;padding:1px 7px;flex-shrink:0}
.feature-group .feat-name{flex:1}
.feature-group .feat-arr{font-size:12px;color:var(--muted);margin-left:auto;transition:transform 0.2s}
.feature-group[open] .feat-arr{transform:rotate(90deg)}
.feature-body{background:var(--card);border:1.5px solid var(--p);border-top:none;border-radius:0 0 var(--r6) var(--r6);padding:12px 14px;font-size:13px;line-height:1.6;color:var(--text)}
.feature-body p{margin-bottom:8px}
.feature-body p:last-child{margin-bottom:0}
.feature-body strong{color:var(--p)}
.feature-body .subclass-badge{display:inline-block;background:var(--accl);border:1px solid rgba(196,162,27,0.5);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;color:#5a3d00;margin-left:4px;vertical-align:middle}

/* ===== BUILDS ===== */
.build-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r6);
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color 0.15s;
}
.build-card:hover{border-color:var(--p)}
.build-card .bc-name{font-weight:700;font-size:14px;flex:1}
.build-card .bc-meta{font-size:12px;color:var(--muted)}
.build-card .bc-del{color:var(--muted);font-size:18px;padding:2px 6px}
.build-card .bc-del:hover{color:var(--neg)}
.save-build-btn{
  width:100%;padding:12px;background:var(--p);color:#fff;border-radius:var(--r6);
  font-size:14px;font-weight:700;margin-bottom:10px;transition:filter 0.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.save-build-btn:hover{filter:brightness(1.1)}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--pd);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:999;opacity:0;pointer-events:none;
  transition:opacity 0.25s,transform 0.25s;max-width:320px;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== MODAL ===== */
.modal-bg{
  position:fixed;inset:0;background:rgba(30,20,60,0.55);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card);border-radius:var(--radius) var(--radius) 0 0;
  width:100%;max-width:500px;max-height:80vh;overflow-y:auto;
  padding:16px;
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.modal-close{margin-left:auto;font-size:22px;color:var(--muted);line-height:1}

/* ===== UTILITY ===== */
.tag{display:inline-block;background:var(--pl);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:600;color:var(--p);margin:2px}
.tag.neg{background:var(--ngl);color:var(--neg)}
.tag.acc{background:var(--accl);color:#5a3d00}
.sep{height:1px;background:var(--border);margin:10px 0}
.hint{font-size:12px;color:var(--muted);font-style:italic;padding:4px 0}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:8px}
.lv-header{background:var(--pl);border-radius:var(--r6);padding:5px 10px;font-size:12px;font-weight:700;color:var(--p);margin:10px 0 6px}

/* ===== QR LINK ===== */
.qr-row{display:flex;gap:8px;margin-top:8px}
.qr-btn{flex:1;padding:8px;background:var(--pl);border:1.5px solid var(--border);border-radius:var(--r6);font-size:12px;color:var(--p);font-weight:600;transition:background 0.15s}
.qr-btn:hover{background:var(--border)}

/* ===== SCROLLBAR ===== */
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-track{background:transparent}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="header">
  <img id="header-icon" src="../icons/raven.png" alt="">
  <div id="header-info">
    <div id="char-name-display">Grave Cleric</div>
    <div id="header-sub">
      <span id="level-display">Level 1 Cleric</span>
      <span id="deity-badge">☽ The Raven Queen</span>
    </div>
    <div id="hp-bar-wrap"><div id="hp-bar" style="width:100%"></div></div>

function T(key,...args){
  const dict=LANG[lang]||LANG.en;
  const s=dict[key]!==undefined?dict[key]:(LANG.en[key]||key);
  return args.reduce((r,a,i)=>r.replace('{'+i+'}',a),s);
}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=T(el.getAttribute('data-i18n-ph')));
  document.querySelectorAll('[data-i18n-html]').forEach(el=>el.innerHTML=T(el.getAttribute('data-i18n-html')));
}

// ══ STATE ══
const SK='dnd_gc', SKB='dnd_gc_builds';
function g(id){return document.getElementById(id);}
function mod(n){return Math.floor((n-10)/2);}
function fmod(n){return (n>=0?'+':'')+n;}
function prof(lv){return lv<5?2:lv<9?3:lv<13?4:lv<17?5:6;}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function showToast(msg,dur=2600){
  const t=g('toast'); t.innerHTML=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

let lv=1, lang='en';
let stats={str:10,dex:10,con:12,int:10,wis:16,cha:10};
let curHp=9, maxHpMan=-1, tmpHp=0;
let slots=[];
let cdUsed=0, eyesUsed=0, sentinelUsed=0, divIntUsed=false;
let luckyUsed=0; // Lucky feat: 3 pts/LR
let concSpell=null, lastDmg=0;
let prepared=new Set(), myCantrips=new Set();
let divineOrder='protector', blessedStrikes='divine';
let gcFeats=new Set();
let inventory=[], profSaves=new Set(['wis','cha']), profSkills=new Set(['history','insight','medicine','religion']);
let builds=[], spellSubTab='mine', expandedSpells=new Set();

// ── Feat bonus helpers ──
function featWIS(){return gcFeats.has('asi-wis')?2:0;}
function featCON(){return (gcFeats.has('resilient-con')?1:0)+(gcFeats.has('asi-con')?2:0);}
function effWIS(){return Math.min(30,stats.wis+featWIS());}
function effCON(){return Math.min(30,stats.con+featCON());}

// ── Level-dependent values ──
function cdMax(){return lv>=18?4:lv>=6?3:lv>=2?2:0;}
function eyesMax(){return Math.max(1,mod(effWIS()));}
function sentinelMax(){return Math.max(1,mod(effWIS()));}
function prepMax(){return Math.max(1,mod(effWIS())+lv);}
function cantripsKnown(){return (lv>=10?5:lv>=4?4:3)+(divineOrder==='thaumaturge'?1:0);}
function maxHp(){
  if(maxHpMan>0) return maxHpMan;
  const cm=mod(effCON()), base=8+cm+(lv-1)*(5+cm);
  return base+(gcFeats.has('tough')?2*lv:0);
}

// ── Domain spells unlocked at current level ──
function getDomainIds(){
  const ids=new Set();
  Object.entries(DOMAIN_IDS).forEach(([reqLv,arr])=>{if(lv>=+reqLv)arr.forEach(id=>ids.add(id));});
  return ids;
}

// ── save / load ──
function getState(){
  return{lv,stats,curHp,maxHpMan,tmpHp,slots,cdUsed,eyesUsed,sentinelUsed,divIntUsed,
    luckyUsed,concSpell,prepared:[...prepared],myCantrips:[...myCantrips],
    divineOrder,blessedStrikes,gcFeats:[...gcFeats],inventory,
    profSaves:[...profSaves],profSkills:[...profSkills],lang,
    name:g('f-name').value,species:g('f-species').value,age:g('f-age').value,
    align:g('f-align').value,bg:g('f-bg').value,deity:g('f-deity').value,
    backstory:g('f-backstory').value,notes:g('f-notes').value};
}
function setState(s){
  if(!s)return;
  lv=s.lv||1; stats=s.stats||stats;
  curHp=s.curHp??maxHp(); maxHpMan=s.maxHpMan??-1; tmpHp=s.tmpHp||0;
  slots=s.slots||[]; cdUsed=s.cdUsed||0; eyesUsed=s.eyesUsed||0;
  sentinelUsed=s.sentinelUsed||0; divIntUsed=s.divIntUsed||false;
  luckyUsed=s.luckyUsed||0;
  concSpell=s.concSpell||null;
  prepared=new Set(s.prepared||[]); myCantrips=new Set(s.myCantrips||[]);
  divineOrder=s.divineOrder||'protector'; blessedStrikes=s.blessedStrikes||'divine';
  gcFeats=new Set(s.gcFeats||[]); inventory=s.inventory||[];
  profSaves=new Set(s.profSaves||['wis','cha']);
  profSkills=new Set(s.profSkills||['history','insight','medicine','religion']);
  lang=s.lang||'en';
  if(s.name) g('f-name').value=s.name;
  if(s.species) g('f-species').value=s.species;
  if(s.age) g('f-age').value=s.age;
  if(s.align) g('f-align').value=s.align;
  if(s.bg) g('f-bg').value=s.bg;
  if(s.deity) g('f-deity').value=s.deity;
  if(s.backstory) g('f-backstory').value=s.backstory;
  if(s.notes) g('f-notes').value=s.notes;
  g('f-level').value=lv;
  g('f-divineorder').value=divineOrder;
  g('f-bstrikes').value=blessedStrikes;
  ['str','dex','con','int','wis','cha'].forEach(k=>{const el=g('s-'+k);if(el)el.value=stats[k];});
}
function save(){try{localStorage.setItem(SK,JSON.stringify(getState()));}catch(e){}}
function load(){
  try{const d=localStorage.getItem(SK);if(d)setState(JSON.parse(d));}catch(e){}
  try{builds=JSON.parse(localStorage.getItem(SKB)||'[]');}catch(e){builds=[];}
}

// ══ RECALC + RENDER STATS ══
const SAVES=['str','dex','con','int','wis','cha'];
const SKILLS=[
  {k:'acrobatics',ab:'dex'},{k:'animal-handling',ab:'wis'},
  {k:'arcana',ab:'int'},{k:'athletics',ab:'str'},
  {k:'deception',ab:'cha'},{k:'history',ab:'int'},
  {k:'insight',ab:'wis'},{k:'intimidation',ab:'cha'},
  {k:'investigation',ab:'int'},{k:'medicine',ab:'wis'},
  {k:'nature',ab:'int'},{k:'perception',ab:'wis'},
  {k:'performance',ab:'cha'},{k:'persuasion',ab:'cha'},
  {k:'religion',ab:'int'},{k:'sleight-of-hand',ab:'dex'},
  {k:'stealth',ab:'dex'},{k:'survival',ab:'wis'}
];

function recalc(){
  stats={
    str:+g('s-str').value||10, dex:+g('s-dex').value||10,
    con:+g('s-con').value||10, int:+g('s-int').value||10,
    wis:+g('s-wis').value||16, cha:+g('s-cha').value||10
  };
  divineOrder=g('f-divineorder').value||'protector';
  blessedStrikes=g('f-bstrikes').value||'divine';
  lv=clamp(+g('f-level').value||1,1,20);
  curHp=clamp(curHp,0,maxHp());
  initSlots();
  renderStatsGrid();
  renderDerived();
  renderSaves();
  renderSkills();
  updateHeader();
  save();
}

function initSlots(){
  const tbl=SLOT_TABLE[Math.min(lv,20)]||SLOT_TABLE[0];
  if(!slots.length||slots.length!==9) slots=[...tbl];
  else for(let i=0;i<9;i++) slots[i]=clamp(slots[i],0,tbl[i]);
}

function renderStatsGrid(){
  const el=g('stats-grid'); if(!el)return;
  const ew=effWIS(), ec=effCON();
  const boostW=featWIS()>0?` <small style="color:var(--acc);font-size:9px">+${featWIS()}</small>`:'';
  const boostC=featCON()>0?` <small style="color:var(--acc);font-size:9px">+${featCON()}</small>`:'';
  const disp=(k)=>{
    const v=stats[k];
    let eff=v;
    if(k==='wis') eff=ew;
    if(k==='con') eff=ec;
    const m=mod(eff), boost=(k==='wis'?boostW:k==='con'?boostC:'');
    return `<div class="stat-box" onclick="editStat('${k}')">
      <div class="stat-name">${k.toUpperCase()}</div>
      <input class="stat-input" type="number" id="s-${k}" value="${v}" min="1" max="30" oninput="recalc()">
      <div class="stat-mod">${fmod(m)}${boost}</div>
    </div>`;
  };
  el.innerHTML=['str','dex','con','int','wis','cha'].map(disp).join('');
}

function renderDerived(){
  const el=g('derived-grid'); if(!el)return;
  const p=prof(lv), ew=effWIS(), ec=effCON();
  const mhp=maxHp();
  const ac=10+mod(stats.dex)+(divineOrder==='protector'?0:0); // base; heavy armor = user sets manually
  const dc=8+p+mod(ew), atk=p+mod(ew);
  const pm=prepMax();
  const profSub=lv<5?T('profLv1'):lv<9?T('profLv5'):lv<13?T('profLv9'):lv<17?T('profLv13'):T('profLv17');
  el.innerHTML=`
    <div class="derived-box"><div class="d-val">${mhp}</div><div class="d-label">Max HP</div></div>
    <div class="derived-box"><div class="d-val">${ac}</div><div class="d-label">AC</div><div style="font-size:9px;color:var(--muted)">${T('acSub')}</div></div>
    <div class="derived-box"><div class="d-val">${fmod(p)}</div><div class="d-label">Prof</div><div style="font-size:9px;color:var(--muted)">${profSub}</div></div>
    <div class="derived-box"><div class="d-val">${dc}</div><div class="d-label">Spell DC</div><div style="font-size:9px;color:var(--muted)">8+Prof+WIS</div></div>
    <div class="derived-box"><div class="d-val">${fmod(atk)}</div><div class="d-label">Spell Atk</div><div style="font-size:9px;color:var(--muted)">Prof+WIS</div></div>
    <div class="derived-box"><div class="d-val">${pm}</div><div class="d-label">${T('labelPrep')}</div><div style="font-size:9px;color:var(--muted)">${T('prepSub')}</div></div>`;
  // also update prof badge in header
  const pb=g('prof-display'); if(pb) pb.textContent='Prof '+fmod(p);
  const ls=g('lv-span'); if(ls) ls.textContent='Lv '+lv;
}

function renderSaves(){
  const el=g('saves-list'); if(!el)return;
  const p=prof(lv);
  const names=(LANG[lang]||LANG.en).saves;
  el.innerHTML=SAVES.map(k=>{
    const eff=(k==='wis'?effWIS():k==='con'?effCON():stats[k]);
    const pro=profSaves.has(k), val=mod(eff)+(pro?p:0);
    return `<div class="check-item">
      <input type="checkbox" ${pro?'checked':''} onchange="toggleSave('${k}')">
      <span class="ci-bonus ${pro?'':'style="color:var(--muted)"'}">${fmod(val)}</span>
      <span class="ci-name">${names[k]||k}</span>
      <span class="ci-ab">${k.toUpperCase().slice(0,3)}</span>
    </div>`;
  }).join('');
}
function toggleSave(k){if(profSaves.has(k))profSaves.delete(k);else profSaves.add(k);renderSaves();save();}

function renderSkills(){
  const el=g('skills-list'); if(!el)return;
  const p=prof(lv);
  const names=(LANG[lang]||LANG.en).skills;
  el.innerHTML=SKILLS.map(sk=>{
    const base=stats[sk.ab]||(sk.ab==='wis'?effWIS():sk.ab==='con'?effCON():stats[sk.ab]);
    const eff=(sk.ab==='wis'?effWIS():sk.ab==='con'?effCON():stats[sk.ab]);
    const pro=profSkills.has(sk.k), val=mod(eff)+(pro?p:0);
    return `<div class="check-item">
      <input type="checkbox" ${pro?'checked':''} onchange="toggleSkill('${sk.k}')">
      <span class="ci-bonus">${fmod(val)}</span>
      <span class="ci-name">${names[sk.k]||sk.k}</span>
      <span class="ci-ab">${sk.ab.toUpperCase().slice(0,3)}</span>
    </div>`;
  }).join('');
}
function toggleSkill(k){if(profSkills.has(k))profSkills.delete(k);else profSkills.add(k);renderSkills();save();}

function updateHeader(){
  const nm=g('f-name').value||T('cleDefault');
  g('char-name-display').textContent=nm;
  g('level-display').textContent=`${T('levelAbbr')} ${lv} Cleric`;
  updateDeityDisplay();
  updateHpBar();
}
function updateDeityDisplay(){
  const d=g('f-deity').value||'The Raven Queen';
  g('deity-badge').textContent='☽ '+d;
}
function updateHpBar(){
  const bar=g('hp-bar'); if(!bar)return;
  const pct=maxHp()>0?Math.max(0,curHp/maxHp()*100):100;
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'#6fbf73':pct>25?'#f4a261':'#e05252';
}
function onLevelChange(){lv=clamp(+g('f-level').value||1,1,20);slots=[];recalc();renderTracker();}

// ══ RENDER TRACKER ══
function pipHtml(i,used,fn){
  return `<div class="ws-pip ${i<used?'f':'e'}" onclick="${fn}(${i})"></div>`;
}
function resourceBlock(icon,label,max,used,toggleFn,note,color='var(--p)'){
  const pips=Array.from({length:max},(_,i)=>pipHtml(i,used,toggleFn)).join('');
  return `<div class="tr-sec">
    <div class="tr-lbl">
      <span style="display:flex;align-items:center;gap:6px">
        <img src="../icons/${icon}" style="width:16px;height:16px;object-fit:contain;opacity:.7">
        ${label}
      </span>
      <span style="font-size:11px;color:var(--os)">${max-used}/${max}</span>
    </div>
    <div class="ws-uses-row">${pips}</div>
    <div style="font-size:11px;color:var(--os);margin-top:4px">${note}</div>
  </div>`;
}
function renderSlotPips(){
  const tbl=SLOT_TABLE[Math.min(lv,20)]||[];
  let html='<div class="spip-row">';
  for(let i=0;i<9;i++){
    const tot=tbl[i]; if(!tot)continue;
    const cur=slots[i]??tot;
    const pips=Array.from({length:tot},(_,j)=>`<span class="pip ${j<cur?'f':'e'}" onclick="toggleSlot(${i},${j})"></span>`).join('');
    const lbl=['1','2','3','4','5','6','7','8','9'][i];
    html+=`<div class="slot-row${cur>0?' hs':''}">
      <span class="slot-lv-lbl">Lv${lbl}</span>
      <span class="slot-pips">${pips}</span>
      <button class="slot-adj" onclick="adjustSlot(${i},-1)" ${cur<=0?'disabled':''}>−</button>
      <button class="slot-adj" onclick="adjustSlot(${i},+1)" ${cur>=tot?'disabled':''}>+</button>
      <span class="slot-count">${cur}/${tot}</span>
    </div>`;
  }
  return html+'</div>';
}

function renderTracker(){
  const mhp=maxHp(), pct=mhp>0?Math.max(0,curHp/mhp*100):0;
  const hpColor=pct>50?'var(--p)':pct>25?'var(--a)':'var(--r)';

  // Concentration bar
  const concHtml=concSpell?`<div class="conc-bar">
    <div class="conc-dot"></div>
    <div class="conc-inf" style="flex:1">
      <div class="conc-sp" style="font-size:12px;font-weight:600;color:#3a2060">🌀 ${concSpell}</div>
      <div class="conc-rn" style="font-size:10px;color:var(--os)">CON DC ${Math.max(10,Math.floor(lastDmg/2)||10)} ${gcFeats.has('war-caster')?'· Adv. (War Caster)':gcFeats.has('resilient-con')?'· Prof CON (Resilient)':''}</div>
    </div>
    <button onclick="concSpell=null;renderTracker();save()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--os)">✕</button>
  </div>`:'';

  // HP section
  const hpHtml=`<div class="tr-sec">
    <div class="tr-lbl">${T('trHP')}
      ${tmpHp>0?`<span style="background:var(--tl);color:var(--td);border-radius:8px;padding:1px 8px;font-size:11px">THP: ${tmpHp}</span>`:''}
    </div>
    <div class="hp-wrap"><div class="hp-fill" style="width:${pct}%;background:${hpColor}"></div></div>
    <div class="hp-row">
      <div class="hp-btns">
        <button class="hbtn m" onclick="changeHp(-1)">−</button>
        <button class="hbtn m" onclick="damagePrompt()">💥</button>
      </div>
      <div class="hp-disp">${curHp}<span class="hpmax"> / ${mhp}</span>${tmpHp>0?`<span style="font-size:12px;color:var(--td)"> +${tmpHp}</span>`:''}</div>
      <div class="hp-btns">
        <button class="hbtn p" onclick="healPrompt()">💊</button>
        <button class="hbtn p" onclick="changeHp(+1)">+</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
      <label style="font-size:11px;color:var(--os);white-space:nowrap">Max HP</label>
      <input type="number" value="${maxHpMan>0?maxHpMan:mhp}" min="1" style="width:60px;text-align:center;border:1px solid var(--ol);border-radius:6px;padding:4px;font-size:13px;background:var(--sf)"
        oninput="maxHpMan=+this.value;curHp=clamp(curHp,0,maxHp());renderTracker();save()">
      <button onclick="maxHpMan=-1;recalc();renderTracker()" style="font-size:10px;color:var(--os);background:none;border:none;cursor:pointer">↺ auto</button>
      <label style="font-size:11px;color:var(--os);white-space:nowrap;margin-left:8px">THP</label>
      <input type="number" value="${tmpHp}" min="0" style="width:50px;text-align:center;border:1px solid var(--ol);border-radius:6px;padding:4px;font-size:13px;background:var(--sf)"
        oninput="tmpHp=Math.max(0,+this.value);renderTracker();save()">
    </div>
  </div>`;

  // Channel Divinity
  const cdHtml=lv>=2?resourceBlock('holy-star.png',T('trCD'),cdMax(),cdUsed,'toggleCD',T('cdNote')):'';

  // Eyes of the Grave (always from lv1 Grave Domain)
  const eyesHtml=resourceBlock('crow.png',T('trEyes'),eyesMax(),eyesUsed,'toggleEyes',T('eyesNote'));

  // Sentinel at Death's Door (lv6)
  const sentHtml=lv>=6?resourceBlock('grave.png',T('trSentinel'),sentinelMax(),sentinelUsed,'toggleSentinel',T('sentinelNote')):'';

  // Divine Intervention (lv10)
  const diHtml=lv>=10?`<div class="tr-sec">
    <div class="tr-lbl">
      <span style="display:flex;align-items:center;gap:6px">
        <img src="../icons/kneel-pray.png" style="width:16px;height:16px;object-fit:contain;opacity:.7">
        ${T('trDivInt')}
      </span>
      <span style="font-size:11px;color:${divIntUsed?'var(--r)':'var(--p)'}">${divIntUsed?'Used':'Ready'}</span>
    </div>
    <div class="ws-uses-row">
      <div class="ws-pip ${divIntUsed?'':'f'}" style="border-color:var(--a)" onclick="toggleDivInt()"></div>
      <span style="font-size:11px;color:var(--os);margin-left:8px">${T('divIntNote')}</span>
    </div>
  </div>`:'';

  // Lucky feat (3 pts, LR recharge)
  const luckyMax=3;
  const luckyHtml=gcFeats.has('lucky')?`<div class="tr-sec">
    <div class="tr-lbl">
      <span>🍀 Lucky</span>
      <span style="font-size:11px;color:var(--os)">${luckyMax-luckyUsed}/${luckyMax}</span>
    </div>
    <div class="ws-uses-row">
      ${Array.from({length:luckyMax},(_,i)=>pipHtml(i,luckyUsed,'toggleLucky')).join('')}
    </div>
    <div style="font-size:11px;color:var(--os);margin-top:4px">Spend to reroll any attack, check, or save — or an attack against you. Recharges on Long Rest.</div>
  </div>`:'';

  // Spell slots
  const slotsHtml=`<div class="tr-sec">
    <div class="tr-lbl">${T('trSlots')}</div>
    ${renderSlotPips()}
  </div>`;

  // Rest buttons
  const restHtml=`<div class="rest-row">
    <button class="btn-rest btn-sr" onclick="shortRest()">${T('trShortRest')}</button>
    <button class="btn-rest btn-lr" onclick="longRest()">${T('trLongRest')}</button>
  </div>`;

  g('tracker-content').innerHTML=concHtml+hpHtml+cdHtml+eyesHtml+sentHtml+diHtml+luckyHtml+slotsHtml+restHtml;
  updateHpBar();
}

// ── Tracker interactions ──
function changeHp(d){curHp=clamp(curHp+d,0,maxHp());renderTracker();save();}
function damagePrompt(){
  const v=prompt('Damage received:'); if(!v||isNaN(+v)||+v<=0)return;
  lastDmg=+v;
  let rem=+v;
  if(tmpHp>0){const ab=Math.min(tmpHp,rem);tmpHp-=ab;rem-=ab;}
  curHp=clamp(curHp-rem,0,maxHp());
  renderTracker();save();
}
function healPrompt(){
  const v=prompt('Heal HP:'); if(!v||isNaN(+v))return;
  curHp=clamp(curHp+(+v),0,maxHp());renderTracker();save();
}
function toggleCD(i){cdUsed=cdUsed>i?i:i+1;renderTracker();save();}
function toggleEyes(i){eyesUsed=eyesUsed>i?i:i+1;renderTracker();save();}
function toggleSentinel(i){sentinelUsed=sentinelUsed>i?i:i+1;renderTracker();save();}
function toggleDivInt(){divIntUsed=!divIntUsed;renderTracker();save();}
function toggleLucky(i){luckyUsed=luckyUsed>i?i:i+1;renderTracker();save();}
function toggleSlot(lvi,j){
  const tbl=SLOT_TABLE[Math.min(lv,20)]||[];
  const cur=slots[lvi]??tbl[lvi];
  slots[lvi]=j<cur?j:j+1;
  renderTracker();save();
}
function adjustSlot(lvi,d){
  const tbl=SLOT_TABLE[Math.min(lv,20)]||[];
  slots[lvi]=clamp((slots[lvi]??tbl[lvi])+d,0,tbl[lvi]);
  renderTracker();save();
}
function shortRest(){
  // Channel Divinity: recover 1 use
  if(lv>=2) cdUsed=Math.max(0,cdUsed-1);
  renderTracker();showToast(T('toastSR'));save();
}
function longRest(){
  curHp=maxHp(); tmpHp=0;
  const tbl=SLOT_TABLE[Math.min(lv,20)]||[];
  slots=[...tbl];
  cdUsed=0; eyesUsed=0; sentinelUsed=0; divIntUsed=false; luckyUsed=0;
  concSpell=null;
  renderTracker();showToast(T('toastLR'));save();
}

// ══ INVENTORY ══
function renderInventory(){
  const el=g('inv-list'); if(!el)return;
  if(!inventory.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:4px 0">No items yet.</div>';return;}
  el.innerHTML=inventory.map((it,i)=>`<div class="inv-row">
    <input class="inv-name" value="${it.n||''}" placeholder="Item..." oninput="inventory[${i}].n=this.value;save()">
    <input class="inv-qty" type="number" value="${it.q||1}" min="0" oninput="inventory[${i}].q=+this.value;save()">
    <button class="inv-del" onclick="delInv(${i})">✕</button>
  </div>`).join('');
}
function addItem(){inventory.push({n:'',q:1});renderInventory();save();}
function delInv(i){inventory.splice(i,1);renderInventory();save();}

// ══ TABS ══
function showTab(t){
  ['char','track','spell','class','builds'].forEach(id=>{
    g('pane-'+id).classList.toggle('active',id===t);
    g('tb-'+id).classList.toggle('active',id===t);
  });
  if(t==='track') renderTracker();
  if(t==='spell') renderSpells();
  if(t==='class') renderClass();
  if(t==='builds') renderBuilds();
}
function setSpellTab(t){
  spellSubTab=t;
  g('sst-mine').classList.toggle('active',t==='mine');
  g('sst-browse').classList.toggle('active',t==='browse');
  g('spell-mine-content').style.display=t==='mine'?'':'none';
  g('spell-browse-content').style.display=t==='browse'?'':'none';
  if(t==='browse') renderExplore('');
}
function setLang(l){
  lang=l;
  ['en','ca','es'].forEach(x=>g('lb-'+x).classList.toggle('active',x===l));
  applyI18n();recalc();renderBuilds();save();
}
function openQR(s){
  const urls={dndbb:'https://www.dndbeyond.com',
    '5etools':'https://5e.tools/spells.html'};
  window.open(urls[s]||'https://5e.tools','_blank');
}
let _editStatKey=null;
function editStat(k){
  _editStatKey=k;
  g('stat-modal-title').textContent=k.toUpperCase();
  g('stat-modal-input').value=stats[k];
  g('stat-modal').classList.add('open');
  g('stat-modal-input').focus();
  g('stat-modal-input').select();
}
function closeStatModal(){g('stat-modal').classList.remove('open');_editStatKey=null;}
function saveStatModal(){
  if(!_editStatKey)return;
  stats[_editStatKey]=clamp(+g('stat-modal-input').value||10,1,30);
  // sync visible input if rendered
  const inp=g('s-'+_editStatKey); if(inp) inp.value=stats[_editStatKey];
  closeStatModal(); recalc();
}
// allow Enter key in modal
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&_editStatKey)saveStatModal();});
function onMaxHpChange(){maxHpMan=+g('f-maxhp').value||1;renderTracker();save();}
function onTmpChange(){}
function healHP(){}
function damageHP(){}

// ══ SPELLS ══
function getSpell(id){return CLERIC_SPELLS.find(s=>s.id===id);}
function isDomain(id){return Object.values(DOMAIN_IDS).flat().includes(id);}
function isUnlocked(id){
  const sp=getSpell(id); if(!sp) return false;
  if(sp.lv===0) return true; // cantrips always available in list
  const maxSlotLv=SLOT_TABLE[Math.min(lv,20)].findIndex((v,i)=>i>0&&v===0);
  const maxLv=maxSlotLv<0?9:maxSlotLv;
  return sp.lv<=maxLv;
}

function spellLevelLabel(lv){
  if(lv===0)return'Cantrip';
  const suf=['','1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
  return suf[lv]||lv+'th';
}

function renderSpells(){
  if(spellSubTab==='mine') renderMySpells();
  else renderExplore('');
}

function renderMySpells(){
  const el=g('spell-mine-content'); if(!el)return;
  const domIds=getDomainIds();
  const prep=prepMax();
  const prepCount=[...prepared].filter(id=>!isDomain(id)&&getSpell(id)?.lv>0).length;
  const cantCount=myCantrips.size;
  const maxCant=cantripsKnown();

  // chips summary
  let html=`<div class="chips" style="margin-bottom:10px">
    <div class="chip" style="background:var(--sv)">
      <div style="font-size:10px;font-weight:700;color:var(--os)">${T('chipCantrips')}</div>
      <div style="font-size:16px;font-weight:700;color:var(--os)">${cantCount}/${maxCant}</div>
    </div>
    <div class="chip" style="background:var(--pl)">
      <div style="font-size:10px;font-weight:700;color:var(--pd)">${T('chipPrepared')}</div>
      <div style="font-size:16px;font-weight:700;color:var(--pd)">${prepCount}/${prep}</div>
    </div>
    <div class="chip" style="background:var(--al)">
      <div style="font-size:10px;font-weight:700;color:var(--ad)">${T('chipDomain')}</div>
      <div style="font-size:16px;font-weight:700;color:var(--ad)">${domIds.size}</div>
    </div>
  </div>`;

  // cantrips
  const cantList=[...myCantrips].map(id=>getSpell(id)).filter(Boolean);
  if(cantList.length){
    html+=`<div class="gh"><span style="font-weight:700">${T('chipCantrips')}</span></div>`;
    cantList.forEach(sp=>{html+=spellCardHtml(sp,false,true);});
  }

  // domain spells
  const domList=CLERIC_SPELLS.filter(sp=>domIds.has(sp.id)&&sp.lv>0);
  if(domList.length){
    html+=`<div class="gh"><span style="font-weight:700">${T('chipDomain')}</span><span class="gh-sub">${T('spAlways')}</span></div>`;
    domList.forEach(sp=>{html+=spellCardHtml(sp,true,false);});
  }

  // prepared spells
  const prepList=[...prepared].map(id=>getSpell(id)).filter(sp=>sp&&sp.lv>0&&!domIds.has(sp.id));
  prepList.sort((a,b)=>a.lv-b.lv);
  if(prepList.length){
    html+=`<div class="gh"><span style="font-weight:700">${T('chipPrepared')}</span><span class="gh-sub">${T('spPreparedBy')}</span></div>`;
    let curLv=-1;
    prepList.forEach(sp=>{
      if(sp.lv!==curLv){curLv=sp.lv;html+=`<div class="sec-lbl">${spellLevelLabel(sp.lv)}</div>`;}
      html+=spellCardHtml(sp,false,false);
    });
  }

  if(!cantList.length&&!domList.length&&!prepList.length){
    html+=`<div class="empty-st"><div class="ei">🕯️</div>${T('spEmptyMsg')}</div>`;
  }
  el.innerHTML=html;
}

function spellCardHtml(sp,isDom,isCant){
  const exp=expandedSpells.has(sp.id);
  const concBadge=sp.conc?`<span class="badge bt">C</span>`:'';
  const ritBadge=sp.ritual?`<span class="badge bg">R</span>`:'';
  const domBadge=isDom?`<span class="badge ba">☽ Domain</span>`:'';
  const lvLabel=sp.lv===0?'Cantrip':spellLevelLabel(sp.lv);
  const isPrepped=prepared.has(sp.id)||isDom||isCant;

  // cast panel: slot buttons
  let castHtml='';
  if(!isCant&&sp.lv>0){
    const tbl=SLOT_TABLE[Math.min(lv,20)]||[];
    const slotBtns=tbl.map((tot,i)=>{
      if(i<sp.lv-1||!tot)return'';
      const avail=slots[i]??tot;
      const disabled=avail<=0?'disabled':'';
      return `<button class="cbt" ${disabled} onclick="castSpell('${sp.id}',${i+1})">${i+1}${avail>0?`<span style="font-size:9px;opacity:.6"> (${avail})</span>`:''}</button>`;
    }).join('');
    if(slotBtns.replace(/<button[^>]*disabled[^>]*>[^<]*<\/button>/g,'').trim()){
      castHtml=`<div class="cast-pan"><div class="cast-lbl">${T('spCastSlot')}</div><div class="cast-btns">${slotBtns}</div></div>`;
    }
    if(sp.conc){
      castHtml+=`<button class="cast-spb" style="margin-top:6px;width:100%" onclick="setConc('${sp.n}')">${concSpell===sp.n?'✓ '+T('spActive'):T('spConc')}</button>`;
    }
  }

  const removeBtn=(!isDom&&isPrepped)?`<button class="btn-sm btn-dn" onclick="removeSpell('${sp.id}')" style="font-size:11px;padding:4px 9px">✕ Remove</button>`:'';

  return `<div class="card ${isDom?'circle':isPrepped?'sel-p':''}" onclick="toggleExpand('${sp.id}')">
    <div class="sp-row-c" style="padding:2px 4px">
      <div class="sp-cb ${isDom?'locked':isPrepped?'ckp':''}">${isDom||isPrepped?'<span class="ck">✓</span>':''}</div>
      <div class="sp-inf">
        <div class="sp-nr">
          <span class="sp-nm">${sp.n}</span>
          ${domBadge}${concBadge}${ritBadge}
          <span class="badge bg" style="margin-left:auto">${lvLabel}</span>
        </div>
        <div class="sp-mt">${sp.sc} · ${sp.time==='A'?'Action':sp.time==='B'?'Bonus Action':sp.time==='R'?'Reaction':sp.time} · ${sp.range}</div>
      </div>
      <button class="exp-btn" onclick="event.stopPropagation();toggleExpand('${sp.id}')">${exp?'▲':'▼'}</button>
    </div>
    ${exp?`<div class="sp-desc" style="padding:8px 12px 4px">
      <p style="color:var(--tx)">${sp.desc}</p>
      ${sp.tip?`<div class="tip-note"><img src="../icons/tip.png" style="width:14px;opacity:.6"><span class="tip-tx">💡 ${sp.tip}</span></div>`:''}
      ${castHtml}
      <div style="margin-top:8px;display:flex;gap:6px">${removeBtn}</div>
    </div>`:''}
  </div>`;
}

function toggleExpand(id){
  if(expandedSpells.has(id))expandedSpells.delete(id);else expandedSpells.add(id);
  renderSpells();
}

function castSpell(id,slotLv){
  const i=slotLv-1;
  if((slots[i]??0)<=0){showToast(T('toastNoSlots'));return;}
  slots[i]--;
  const sp=getSpell(id);
  if(sp?.conc&&concSpell&&concSpell!==sp.n){
    if(!confirm(T('confirmConc',concSpell)))return;
  }
  if(sp?.conc) concSpell=sp.n;
  renderTracker();renderSpells();save();
  showToast(`🎯 ${sp?.n} cast with Lv${slotLv} slot`);
}
function setConc(name){
  if(concSpell&&concSpell!==name&&!confirm(T('confirmConc',concSpell)))return;
  concSpell=concSpell===name?null:name;
  renderTracker();renderSpells();save();
}
function removeSpell(id){
  prepared.delete(id);myCantrips.delete(id);
  renderSpells();save();
}

// ── Browse & Add ──
function renderExplore(q){
  const el=g('spell-browse-content'); if(!el)return;
  const domIds=getDomainIds();
  const maxSpLv=SLOT_TABLE[Math.min(lv,20)].reduce((acc,v,i)=>v>0?i+1:acc,0);
  const qq=(q||'').toLowerCase();

  let filtered=CLERIC_SPELLS.filter(sp=>{
    if(qq&&!sp.n.toLowerCase().includes(qq)&&!sp.sc.toLowerCase().includes(qq))return false;
    return true;
  });
  filtered.sort((a,b)=>a.lv-b.lv||a.n.localeCompare(b.n));

  let html=`<div class="srch-box">
    <span class="srch-ic">🔍</span>
    <input type="text" value="${q||''}" data-i18n-ph="spSearch" placeholder="Search spells..." oninput="renderExplore(this.value)" style="padding-left:30px">
  </div>`;

  if(!filtered.length){html+=`<div class="empty-st"><div class="ei">🔍</div>${T('spNoFound')}</div>`;el.innerHTML=html;return;}

  let curLv=-1;
  filtered.forEach(sp=>{
    if(sp.lv!==curLv){
      curLv=sp.lv;
      html+=`<div class="gh"><hr class="hr"><span style="font-weight:700">${sp.lv===0?T('chipCantrips'):spellLevelLabel(sp.lv)}</span></div>`;
    }
    const dom=domIds.has(sp.id);
    const inList=sp.lv===0?myCantrips.has(sp.id):prepared.has(sp.id)||dom;
    const unavail=sp.lv>0&&sp.lv>maxSpLv&&!dom;
    const exp=expandedSpells.has(sp.id+'_b');
    const concBadge=sp.conc?`<span class="badge bt">C</span>`:'';
    const ritBadge=sp.ritual?`<span class="badge bg">R</span>`:'';
    const domBadge=dom?`<span class="badge ba">☽</span>`:'';
    const addRemoveBtn=unavail?`<span style="font-size:10px;color:var(--os)">Lv${sp.lv} req.</span>`:
      inList?`<button class="btn-sm btn-dn" onclick="event.stopPropagation();browseRemove('${sp.id}')">✕</button>`:
      `<button class="btn-sm btn-pr" onclick="event.stopPropagation();browseAdd('${sp.id}')">+ Add</button>`;

    html+=`<div class="card ${inList?'sel-p':''} ${unavail?'':''}${dom?' circle':''}" style="${unavail?'opacity:.5':''}" onclick="toggleExpandB('${sp.id}')">
      <div class="sp-row-c" style="padding:2px 4px">
        <div class="sp-inf">
          <div class="sp-nr">
            <span class="sp-nm">${sp.n}</span>
            ${domBadge}${concBadge}${ritBadge}
          </div>
          <div class="sp-mt">${sp.sc} · ${sp.time==='A'?'Action':sp.time==='B'?'Bonus':sp.time==='R'?'Reaction':sp.time} · ${sp.range} · ${sp.src}</div>
        </div>
        ${addRemoveBtn}
        <button class="exp-btn" onclick="event.stopPropagation();toggleExpandB('${sp.id}')">${exp?'▲':'▼'}</button>
      </div>
      ${exp?`<div class="sp-desc" style="padding:8px 12px 4px">
        <p>${sp.desc}</p>
        ${sp.tip?`<div class="tip-note"><span class="tip-tx">💡 ${sp.tip}</span></div>`:''}
      </div>`:''}
    </div>`;
  });
  el.innerHTML=html;
}
function toggleExpandB(id){
  const k=id+'_b';
  if(expandedSpells.has(k))expandedSpells.delete(k);else expandedSpells.add(k);
  renderExplore(g('spell-browse-content')?.querySelector('input')?.value||'');
}
function browseAdd(id){
  const sp=getSpell(id); if(!sp)return;
  const domIds=getDomainIds();
  if(domIds.has(id)){renderExplore();return;} // domain, always prepared
  if(sp.lv===0){
    if(myCantrips.size>=cantripsKnown()){showToast(`Max cantrips: ${cantripsKnown()}`);return;}
    myCantrips.add(id);
  } else {
    const prepCount=[...prepared].filter(i=>!isDomain(i)&&getSpell(i)?.lv>0).length;
    if(prepCount>=prepMax()){showToast(T('toastMaxPrep',prepMax(),lv));return;}
    prepared.add(id);
  }
  renderExplore(g('spell-browse-content')?.querySelector('input')?.value||'');
  renderMySpells();save();
}
function browseRemove(id){
  prepared.delete(id);myCantrips.delete(id);
  renderExplore(g('spell-browse-content')?.querySelector('input')?.value||'');
  renderMySpells();save();
}

// ══ CLASS TAB ══
function renderClass(){
  const el=g('class-content'); if(!el)return;
  const p=prof(lv), ew=effWIS(), dc=8+p+mod(ew), atk=p+mod(ew);

  const features=[
    {lv:1,sub:false,n:'Spellcasting',body:`<p><strong>Spellcasting Ability:</strong> Wisdom. Spell Save DC: <strong>${dc}</strong>. Spell Attack: <strong>${fmod(atk)}</strong>.</p>
      <p><strong>Cantrips Known:</strong> ${cantripsKnown()} (${divineOrder==='thaumaturge'?'+1 from Thaumaturge':'base'}).</p>
      <p><strong>Prepared Spells:</strong> ${prepMax()} (WIS mod + level = ${mod(ew)}+${lv}).</p>
      <p><strong>Ritual Casting:</strong> Can cast any prepared spell with the Ritual tag without expending a slot (+10 min casting time).</p>
      <p><strong>Focus:</strong> Holy symbol.</p>`},
    {lv:1,sub:false,n:'Divine Order',body:`<p>Choose one sacred role:</p>
      <p><strong>Protector</strong> — Proficiency with Martial weapons and Heavy armor.</p>
      <p><strong>Thaumaturge</strong> — Know 1 extra cantrip. Bonus to INT (Arcana or Religion) = WIS mod (+${mod(ew)}).</p>
      <p><em>Current choice: <strong>${divineOrder==='protector'?'Protector':'Thaumaturge'}</strong></em></p>`},
    {lv:1,sub:true,n:'Circle of Mortality',body:`<p>When you roll dice to restore HP to a creature at <strong>0 HP</strong>, use the highest number possible for each die (no rolling needed).</p>
      <p><strong>Spare the Dying:</strong> You know this cantrip. For you: <em>range 30 ft</em> and can be cast as a <em>Bonus Action</em>.</p>`},
    {lv:1,sub:true,n:'Eyes of the Grave',body:`<p>As an Action, detect undead within <strong>60 ft</strong> (not behind total cover, not protected from divination). Know their location but not their capabilities.</p>
      <p><strong>Uses:</strong> ${eyesMax()} (= WIS mod). Regain all on Long Rest.</p>`},
    {lv:2,sub:false,n:'Channel Divinity',body:`<p>Channel divine energy. Regain <strong>1 use on Short Rest</strong>, all uses on Long Rest.</p>
      <p><strong>Uses at Lv ${lv}:</strong> ${cdMax()}</p>
      <hr style="margin:8px 0;border-color:var(--ol)">
      <p><strong>Divine Spark:</strong> Magic action. Point at creature within 30 ft: roll 1d8 + WIS mod. Either restore that much HP, or force CON save or deal Necrotic/Radiant. (2d8 at lv7, 3d8 at lv13, 4d8 at lv18)</p>
      <p><strong>Turn Undead:</strong> Magic action. Each undead within 30 ft makes WIS save or Frightened + Incapacitated for 1 min. Effect ends if it takes damage.</p>
      <p><strong>Path to the Grave:</strong> Action. Choose creature within 30 ft: next hit vs it has vulnerability to all damage of that attack. (Curse ends after triggering.)</p>`},
    {lv:4,sub:false,n:'Ability Score Improvement',body:`<p>Gain the Ability Score Improvement feat or another qualifying feat. Available at levels <strong>4, 8, 12, 16</strong>.</p>`},
    {lv:5,sub:false,n:'Sear Undead',body:`<p>When you use <strong>Turn Undead</strong>, roll ${Math.max(1,mod(ew))}d8 (= WIS mod, min 1). Each undead that fails its save takes <strong>${Math.max(1,mod(ew))}d8 Radiant</strong> damage. This does not end the Frightened/Incapacitated effect.</p>`},
    {lv:6,sub:true,n:"Sentinel at Death's Door",body:`<p><strong>Reaction:</strong> When you or a creature within <strong>30 ft</strong> suffers a critical hit, turn it into a normal hit. All critical effects are cancelled.</p>
      <p><strong>Uses:</strong> ${sentinelMax()} (= WIS mod). Regain all on Long Rest.</p>${lv<6?'<p><em>Unlocks at level 6.</em></p>':''}`},
    {lv:7,sub:false,n:'Blessed Strikes',body:`<p>Choose one option (choose in Character tab):</p>
      <p><strong>Divine Strike:</strong> Once per turn when you hit with a weapon attack, deal +1d8 Necrotic or Radiant damage (your choice).</p>
      <p><strong>Potent Spellcasting:</strong> Add WIS mod (+${mod(ew)}) to cantrip damage rolls.</p>
      <p><em>Current: <strong>${blessedStrikes==='divine'?'Divine Strike (+1d8)':'Potent Spellcasting (+'+mod(ew)+')'}</strong></em></p>
      ${lv<7?'<p><em>Unlocks at level 7.</em></p>':''}`},
    {lv:10,sub:false,n:'Divine Intervention',body:`<p>Magic action: cast any Cleric spell of level 5 or lower without expending a slot or material components. Once per Long Rest.</p>
      <p><strong>At level 20:</strong> You can choose Wish. Then you need 2d4 Long Rests before using Divine Intervention again.</p>
      ${lv<10?'<p><em>Unlocks at level 10.</em></p>':''}`},
    {lv:14,sub:false,n:'Improved Blessed Strikes',body:`<p><strong>Divine Strike upgrade:</strong> +2d8 damage (was +1d8).</p>
      <p><strong>Potent Spellcasting upgrade:</strong> When you deal cantrip damage, give yourself or an ally within 60 ft THP equal to <strong>2 × WIS mod (${2*Math.max(0,mod(ew))})</strong>.</p>
      ${lv<14?'<p><em>Unlocks at level 14.</em></p>':''}`},
    {lv:17,sub:true,n:'Keeper of Souls',body:`<p>When an enemy you can see <strong>dies within 60 ft</strong>, you or one creature within 60 ft regains HP equal to the enemy's number of Hit Dice. Once per turn. Only if you are not Incapacitated.</p>
      ${lv<17?'<p><em>Unlocks at level 17.</em></p>':''}`},
    {lv:19,sub:false,n:'Epic Boon',body:`<p>Gain an Epic Boon feat or another qualifying feat. <strong>Boon of Fate</strong> is recommended (add 2d4 to any roll, 2/LR).</p>
      ${lv<19?'<p><em>Unlocks at level 19.</em></p>':''}`},
  ];

  let html=`<div class="info-bn" style="margin-bottom:10px">
    Lv <strong>${lv}</strong> Grave Cleric · WIS <strong>${stats.wis}${featWIS()>0?` (+${featWIS()})`:''}</strong> · DC <strong>${dc}</strong> · Atk <strong>${fmod(atk)}</strong>
  </div>`;

  features.forEach(f=>{
    const locked=f.lv>lv;
    const subBadge=f.sub?`<span class="badge ba" style="font-size:9px">☽ Grave Domain</span>`:'';
    html+=`<div class="acc" style="${locked?'opacity:.5':''}">
      <div class="acc-hd" onclick="toggleAcc('cf-${f.n.replace(/\s/g,'-')}')">
        <span class="badge ${locked?'bg':'bp'}" style="min-width:28px;text-align:center">${f.lv}</span>
        <span class="acc-tl">${f.n} ${subBadge}</span>
        <span class="acc-ch" id="ch-cf-${f.n.replace(/\s/g,'-')}">▼</span>
      </div>
      <div class="acc-bd" id="bd-cf-${f.n.replace(/\s/g,'-')}">${f.body}</div>
    </div>`;
  });

  // Feats section
  html+=`<div class="sec-lbl" style="margin-top:14px">${T('clFeatsTitle')}</div>
  <div style="font-size:11px;color:var(--os);margin-bottom:8px">${T('clFeatsDesc')}</div>
  <div class="feat-grid">`;
  FEATS_GC.forEach(f=>{
    const on=gcFeats.has(f.id);
    html+=`<div class="feat-toggle-card ${on?'on':''}" onclick="toggleFeat('${f.id}')">
      <div class="feat-tc-head">
        <span class="feat-tc-icon">${f.icon}</span>
        <span class="feat-tc-name">${f.n}</span>
        <span class="feat-tc-tag">${f.tag}</span>
      </div>
      <div class="feat-tc-desc">${f.desc}</div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
function toggleFeat(id){
  if(gcFeats.has(id))gcFeats.delete(id);else gcFeats.add(id);
  recalc();renderClass();renderTracker();save();
}
function toggleAcc(id){
  const bd=g('bd-'+id),ch=g('ch-'+id);
  if(!bd)return;
  const op=bd.classList.toggle('open');
  if(ch)ch.classList.toggle('open',op);
}

// ══ BUILDS ══
function renderBuilds(){
  const el=g('builds-list'); if(!el)return;
  if(!builds.length){el.innerHTML=`<div class="empty-st"><div class="ei">💾</div>${T('buildsEmpty')}</div>`;return;}
  el.innerHTML=builds.map((b,i)=>`<div class="bc ${b.active?'isact':''}">
    <div class="bc-top">
      <div class="bc-av" style="background:var(--pl);color:var(--p);font-size:20px">☽</div>
      <div class="bc-inf">
        <div class="bc-nm">${b.name||T('cleDefault')}</div>
        <div class="bc-mt">${T('levelAbbr')} ${b.lv||1} · ${b.species||'Human'} · ${b.bg||'Acolyte'}</div>
      </div>
      ${b.active?`<span class="badge bp">${T('buildsActive')}</span>`:''}
    </div>
    <div class="bc-act">
      <button class="btn-sm btn-pr" onclick="loadBuild(${i})">${T('buildsLoad')}</button>
      <button class="btn-sm btn-ou" onclick="overwriteBuild(${i})">↺ Save</button>
      <button class="btn-sm btn-dn" onclick="deleteBuild(${i})">${T('buildsDelete')}</button>
    </div>
  </div>`).join('');
}
function saveBuild(){
  const state=getState();
  builds.push({...state,active:true,ts:Date.now()});
  builds.forEach((b,i)=>b.active=(i===builds.length-1));
  try{localStorage.setItem(SKB,JSON.stringify(builds));}catch(e){}
  renderBuilds();showToast('💾 Build saved!');
}
function overwriteBuild(i){
  const state=getState();builds[i]={...state,active:true,ts:Date.now()};
  builds.forEach((b,j)=>b.active=(j===i));
  try{localStorage.setItem(SKB,JSON.stringify(builds));}catch(e){}
  renderBuilds();showToast('💾 Build updated!');
}
function loadBuild(i){
  const b=builds[i]; if(!b)return;
  setState(b); builds.forEach((bx,j)=>bx.active=(j===i));
  recalc();renderTracker();renderSpells();renderClass();renderBuilds();
  showToast('📂 Build loaded!');
}
function deleteBuild(i){
  if(!confirm(T('confirmDelete')))return;
  builds.splice(i,1);
  try{localStorage.setItem(SKB,JSON.stringify(builds));}catch(e){}
  renderBuilds();
}

// ══ INIT ══
window.addEventListener('load',()=>{
  load();
  ['en','ca','es'].forEach(x=>g('lb-'+x).classList.toggle('active',x===lang));
  applyI18n();
  recalc();
  renderInventory();
  renderTracker();
  renderClass();
  renderBuilds();
  // Spell tab init
  g('spell-mine-content').style.display='';
  g('spell-browse-content').style.display='none';
  renderMySpells();
  // Header
  updateHeader();
  // SW update notification
  if('serviceWorker' in navigator){
    navigator.serviceWorker.addEventListener('message',e=>{
      if(e.data?.type==='SW_UPDATED') showToast('🔄 App updated! Reload to get the latest version.',4000);
    });
  }
});

// ══ SERVICE WORKER ══
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
