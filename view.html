<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>D&D — Character Snapshot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#7F77DD;--pl:#EEEEFE;--pd:#3C3489;
  --t:#1D9E75;--tl:#E1F5EE;
  --r:#D85A30;--rl:#FAECE7;
  --bg:#F4F4F8;--sf:#FFF;--sv:#F0F0F4;
  --ol:#D4D4DC;--os:#666;--tx:#1a1a1a;
  --rr:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0F0F1A;--sf:#1A1A2A;--sv:#22223A;--ol:#333350;--os:#9090B8;--tx:#E0E0F0;--pl:#21204A;--pd:#B0AAEE;}
}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px 16px 40px}
.header{text-align:center;padding:20px 0 16px}
.char-name{font-size:26px;font-weight:800;color:var(--tx)}
.char-sub{font-size:14px;color:var(--os);margin-top:4px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.bp{background:var(--pl);color:var(--pd)}
.bt{background:#E3F4EE;color:#085041}
.br{background:var(--rl);color:var(--r)}
.card{background:var(--sf);border-radius:var(--rr);padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-lbl{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--os);margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* HP */
.hp-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.hp-val{font-size:40px;font-weight:800}
.hp-max{font-size:18px;color:var(--os);font-weight:400}
.hp-bar-wrap{height:12px;background:var(--sv);border-radius:6px;overflow:hidden}
.hp-bar-fill{height:100%;border-radius:6px;transition:width .3s}
.hp-pct{text-align:center;font-size:12px;color:var(--os);margin-top:6px}
/* Spell slots */
.slots-grid{display:flex;flex-wrap:wrap;gap:8px}
.slot-lv{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;background:var(--sv);border-radius:10px;min-width:56px}
.slot-lv-num{font-size:11px;font-weight:700;color:var(--os)}
.slot-pips{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.pip{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ol)}
.pip.f{background:var(--p);border-color:var(--p)}
.pip.e{background:transparent}
.slot-rem{font-size:12px;font-weight:700;color:var(--tx)}
/* Sorcery */
.sp-row{display:flex;align-items:center;justify-content:space-between}
.sp-big{font-size:28px;font-weight:800;color:var(--pd)}
.sp-bar-wrap{height:8px;background:var(--sv);border-radius:4px;overflow:hidden;margin-top:8px}
.sp-bar-fill{height:100%;border-radius:4px;background:var(--p)}
/* Concentration */
.conc-bar{display:flex;align-items:center;gap:10px}
.conc-dot{width:12px;height:12px;border-radius:50%;background:var(--r);flex-shrink:0;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.conc-name{font-size:15px;font-weight:600;color:var(--r)}
.conc-rnd{font-size:12px;color:var(--os)}
/* Timestamp */
.ts-bar{text-align:center;font-size:11px;color:var(--os);margin-top:20px;padding:12px;background:var(--sf);border-radius:var(--rr)}
.ts-bar strong{color:var(--tx)}
/* Error */
.err{text-align:center;padding:60px 20px;color:var(--os)}
.err h2{color:var(--tx);margin-bottom:8px}
/* Logo */
.logo-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px}
.dm-badge{font-size:10px;font-weight:700;letter-spacing:1px;background:var(--p);color:#fff;padding:3px 8px;border-radius:20px}
</style>
</head>
<body>
<div id="root"></div>
<script>
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='class')e.className=v;else if(k==='style')e.style.cssText=v;else e[k]=v;});
  if(children){if(typeof children==='string')e.innerHTML=children;else children.forEach(c=>c&&e.appendChild(typeof c==='string'?document.createTextNode(c):c));}
  return e;
}
function hpColor(pct){return pct>0.5?'#2E9E60':pct>0.25?'#C68A00':'#D85A30';}
function fmt(ts){
  const d=new Date(ts*1000);
  return d.toLocaleDateString()+'  '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function render(d){
  const root=document.getElementById('root');
  const maxHp=d.mh||1,hp=d.h||0;
  const hpPct=Math.max(0,Math.min(1,hp/maxHp));
  const spMax=d.sp2?d.sp2[1]:d.lv||7;
  const spRem=d.sp2?d.sp2[0]:(d.lv||7);
  const spPct=spMax>0?spRem/spMax:1;

  // Header
  root.appendChild(el('div',{class:'header'},[
    el('div',{class:'logo-bar'},[
      el('span',{class:'dm-badge'},'DM VIEW')
    ]),
    el('div',{class:'char-name'},d.n||'Personatge'),
    el('div',{class:'char-sub'},(d.cl||'Sorcerer')+' · Lv '+(d.lv||'?')+' · '+(d.sp||'Human')),
  ]));

  // HP Card
  const hpCard=el('div',{class:'card'});
  hpCard.appendChild(el('div',{class:'card-lbl'},'❤️  HIT POINTS'));
  const hpNum=el('div',{class:'hp-row'});
  hpNum.appendChild(el('span',{class:'hp-val',style:`color:${hpColor(hpPct)}`},String(hp)));
  hpNum.appendChild(el('span',{class:'hp-max'},` / ${maxHp}`));
  hpCard.appendChild(hpNum);
  const hpBarW=el('div',{class:'hp-bar-wrap'});
  hpBarW.appendChild(el('div',{class:'hp-bar-fill',style:`width:${hpPct*100}%;background:${hpColor(hpPct)}`},''));
  hpCard.appendChild(hpBarW);
  hpCard.appendChild(el('div',{class:'hp-pct'},`${Math.round(hpPct*100)}% HP · ${maxHp-hp} dany absorbit`));
  root.appendChild(hpCard);

  // Concentration
  if(d.c){
    const cCard=el('div',{class:'card',style:'border-left:3px solid var(--r)'});
    cCard.appendChild(el('div',{class:'card-lbl'},'🔴  CONCENTRACIÓ'));
    const cb=el('div',{class:'conc-bar'});
    cb.appendChild(el('div',{class:'conc-dot'},''));
    const ci=el('div',{},[
      el('div',{class:'conc-name'},d.c),
      el('div',{class:'conc-rnd'},'Round '+( d.cr||0)),
    ]);
    cb.appendChild(ci);
    cCard.appendChild(cb);
    root.appendChild(cCard);
  }

  // Spell Slots
  if(d.sl && Object.keys(d.sl).length){
    const sCard=el('div',{class:'card'});
    sCard.appendChild(el('div',{class:'card-lbl'},'✨  SPELL SLOTS'));
    const grid=el('div',{class:'slots-grid'});
    Object.entries(d.sl).forEach(([lv,[used,max]])=>{
      const rem=max-used;
      const grp=el('div',{class:'slot-lv'+(rem===0?' '+'':'')});
      grp.appendChild(el('div',{class:'slot-lv-num'},'Lv '+lv));
      const pipsDiv=el('div',{class:'slot-pips'});
      for(let i=0;i<max;i++){
        pipsDiv.appendChild(el('span',{class:'pip '+(i<rem?'f':'e')},''));
      }
      grp.appendChild(pipsDiv);
      grp.appendChild(el('div',{class:'slot-rem',style:rem===0?'color:var(--os)':''}, rem+'/'+max));
      grid.appendChild(grp);
    });
    sCard.appendChild(grid);
    root.appendChild(sCard);
  }

  // Sorcery Points
  const spCard=el('div',{class:'card'});
  spCard.appendChild(el('div',{class:'card-lbl'},'💜  SORCERY POINTS'));
  const spRow=el('div',{class:'sp-row'});
  spRow.appendChild(el('span',{class:'sp-big',style:spRem===0?'color:var(--os)':''},String(spRem)));
  spRow.appendChild(el('span',{style:'font-size:14px;color:var(--os)'},' / '+spMax));
  spRow.appendChild(el('span',{style:'font-size:13px;color:var(--os);margin-left:auto'},spRem+' restants'));
  spCard.appendChild(spRow);
  const spBarW=el('div',{class:'sp-bar-wrap'});
  spBarW.appendChild(el('div',{class:'sp-bar-fill',style:`width:${spPct*100}%`},''));
  spCard.appendChild(spBarW);
  root.appendChild(spCard);

  // Timestamp
  root.appendChild(el('div',{class:'ts-bar'},
    'Snapshot generat: <strong>'+fmt(d.ts)+'</strong><br><span style="font-size:10px">Escaneja de nou per actualitzar</span>'
  ));
}

function showError(msg){
  document.getElementById('root').innerHTML=`<div class="err"><h2>Error</h2><p>${msg}</p></div>`;
}

try{
  const params=new URLSearchParams(location.search);
  const raw=params.get('d');
  if(!raw)throw new Error('No hi ha dades al QR.');
  const data=JSON.parse(atob(decodeURIComponent(raw)));
  render(data);
}catch(e){
  showError('No s\'han pogut llegir les dades del QR. Escaneja de nou.');
}
</script>
</body>
</html>
